function sortExpBy(v){
  var items = EXP.filter(function(e){
    var sOk=(ST.expSeg||'all')==='all'||e.segment===(ST.expSeg||'all');
    var tOk=(ST.expType||'all')==='all'||e.type===(ST.expType||'all');
    return sOk&&tOk;
  });
  if(v==='pa') items.sort(function(a,b){return a.price-b.price;});
  else if(v==='pd') items.sort(function(a,b){return b.price-a.price;});
  else if(v==='r') items.sort(function(a,b){return b.rating-a.rating;});
  var g=document.getElementById('expCards');
  if(g){g.innerHTML=renderExpCards(items);setTimeout(initReveal,60);}
}

/* Live search across loaded experiences (debounced re-render) */
var _expSearchTimer = null;
function searchExpBy(q){
  ST.expQ = q || '';
  if (_expSearchTimer) clearTimeout(_expSearchTimer);
  _expSearchTimer = setTimeout(function(){
    var prev = document.getElementById('expSearch');
    var cursorAt = prev ? prev.selectionStart : null;
    document.getElementById('app').innerHTML = pgExp() + '';
    var inp = document.getElementById('expSearch');
    if (inp) {
      inp.focus();
      if (cursorAt != null) try { inp.setSelectionRange(cursorAt, cursorAt); } catch(_){}
    }
    setTimeout(initReveal, 60);
  }, 130);
}

function dTouchEnd(ev){var dx=ev.changedTouches[0].clientX-_dTx;if(Math.abs(dx)>40)dSlide(dx<0?1:-1);}
function dSlide(dir){
  var t=document.getElementById('dSlTrack');if(!t)return;
  var n=t.children.length;
  dSlideTo((parseInt(t.dataset.cur||0)+dir+n)%n);
}
function dSlideTo(idx){
  var t=document.getElementById('dSlTrack');if(!t)return;
  var w=t.parentNode.offsetWidth;
  t.dataset.cur=idx;
  t.style.transform='translateX(-'+(idx*w)+'px)';
  var dots=document.querySelectorAll('#dSlDots .d-sl-dot');
  dots.forEach(function(d,i){d.classList.toggle('act',i===idx);});
}
function initDetailSlider(){
  var t=document.getElementById('dSlTrack');if(!t)return;

}

/* Activity sliders by category */
function renderActSliders(){
  var groups = [
    {id:'adventure', label:'Adventure & Adrenaline', icon:'🏔️', color:'#B8172E'},
    {id:'culture',   label:'Culture & Heritage',     icon:'🏛️', color:'#3D6B35'},
    {id:'wellness',  label:'Wellness & Sunrise',     icon:'🧘', color:'#7C3AED'},
    {id:'corporate', label:'Corporate & Team',       icon:'🤝', color:'#D97706'}
  ];
  var html = '<div id="actCards" style="padding:0 0 32px">';
  groups.forEach(function(g){
    var items = ACTS.filter(function(a){return a.cat===g.id;});
    if(!items.length) return;
    html += '<section class="exp-slider-section" style="margin:18px 0 10px">'
      +'<div class="exp-slider-head" style="display:flex;align-items:center;justify-content:space-between;padding:0 5%;margin-bottom:14px">'
        +'<div style="display:flex;align-items:center;gap:10px">'
          +'<div style="width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;background:linear-gradient(135deg,'+g.color+'18 0%,'+g.color+'08 100%);border:1px solid '+g.color+'25">'+g.icon+'</div>'
          +'<div>'
            +'<h3 style="font-family:\'Cormorant Garamond\',serif;font-size:22px;font-weight:600;color:var(--txt);line-height:1;letter-spacing:-.012em">'+g.label+'</h3>'
            +'<div style="font-size:11px;color:var(--mut);margin-top:3px;font-weight:600;letter-spacing:.04em">'+items.length+' activité'+(items.length>1?'s':'')+' express</div>'
          +'</div>'
        +'</div>'
        +'<button onclick="ST.actCat=\''+g.id+'\';go(\'activities\')" style="background:none;border:none;font-family:inherit;font-size:12px;font-weight:700;color:'+g.color+';cursor:pointer;letter-spacing:.04em">Tout voir →</button>'
      +'</div>'
      +'<div class="exp-slider-row">'
      +items.map(function(a){return renderActSlideCard(a, g.color);}).join('')
      +'</div>'
    +'</section>';
  });
  html += '</div>';
  return html;
}

    +'<div style="position:relative;aspect-ratio:5/4;overflow:hidden">'
      +'<img src="'+a.img+'" alt="'+a.title+'" loading="lazy" style="width:100%;height:100%;object-fit:cover">'

var TB_DATA = {tbsize:'',tbdur:'',tbloc:'',tbprog:[],tbobj:[],tbbudget:''};

function tbPick(field, val){
  var multi = ['tbprog','tbobj'];
  if(multi.indexOf(field) !== -1){
    var arr = TB_DATA[field] || [];
    var idx = arr.indexOf(val);
    if(idx === -1) arr.push(val); else arr.splice(idx, 1);
    TB_DATA[field] = arr;

  }

function tbGoStep(n){
  for(var i=0;i<5;i++){var s=document.getElementById('tbForm'+i);if(s)s.style.display='none';}

  ['tbStep0','tbStep1','tbStep2','tbStep3'].forEach(function(id,i){
    var el=document.getElementById(id);if(!el)return;
    var active=i===n, done=i<n;

      dot.style.background=active?'#D97706':done?'rgba(255,255,255,.18)':'rgba(255,255,255,.07)';

function tbShake(el){
  if(!el) return;
  var frames=[0,6,-6,4,-4,2,-2,0],i=0;

}

  var el=document.getElementById(id);

  if(!ok){el.style.borderColor='var(--red)';el.style.boxShadow='0 0 0 3px rgba(184,23,46,.12)';tbShake(el.closest('.fg')||el);}
  else{el.style.borderColor='';el.style.boxShadow='';}
  return !!ok;
}

function tbValidateStep(from){

function filterBlog(cat){
  var grid=document.getElementById('blogGrid');
  var items=cat==='All'?POSTS:POSTS.filter(function(p){return p.cat===cat;});
  grid.innerHTML=items.map(function(p){return '<div class="bc reveal" onclick="go(\'post\',\''+p.id+'\')"><div class="bc-img"><img src="'+p.img+'" alt="'+p.title+'" loading="lazy"></div><div class="bc-body"><div class="bc-cat">'+p.cat+'</div><div class="bc-title">'+p.title+'</div><div class="bc-exc">'+p.exc+'</div><div class="bc-meta">'+p.read+' read · '+p.date+'</div></div></div>';}).join('')||'<div style="grid-column:1/-1;text-align:center;padding:36px;color:var(--mut)">No articles in this category yet.</div>';
  setTimeout(initReveal,80);
}

/* PAGE: POST DETAIL */

function submitContact(){
  var fn=v('cFn'),ln=v('cLn'),em=v('cEm'),ph=v('cPh'),ms=v('cMs');
  var sel=document.getElementById('cTy');
  if(!fn){toast('Entrez votre prénom','warn');return;}
  if(!em||!em.includes('@')){toast('Email invalide','warn');return;}
  if(!ms){toast('Écrivez votre message','warn');return;}
  apiPost('/forms/contact',{fname:fn,lname:ln||'',email:em,phone:ph||'',subject:sel?sel.value:'',message:ms})
    .then(function(){
      toast('Message envoyé ! Réponse sous 24h.');
      ['cFn','cLn','cEm','cPh','cMs'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
      if(sel)sel.value='';
    }).catch(function(err){toast('Erreur : '+err.message,'warn');});
}

/* Form helpers */
var PLAN_DATA = {seg:'',type:[],group:'',dur:'',budget:'',lang:'',dateFrom:'',dateTo:''};

function planPick(field, val){
  var multiFields=['type'];
  if(multiFields.indexOf(field)!==-1){
    var arr=PLAN_DATA[field]||[];
    var idx=arr.indexOf(val);
    if(idx===-1) arr.push(val); else arr.splice(idx,1);
    PLAN_DATA[field]=arr;
  } else {
    PLAN_DATA[field]=val;
  }
  /* Update visual */
  var pickerId=field+'PickerF';
  var picker=document.getElementById(pickerId);
  if(!picker)return;
  picker.querySelectorAll('.plan-opt').forEach(function(el){
    var elVal=el.dataset.val;
    var sel=multiFields.indexOf(field)!==-1?(PLAN_DATA[field]||[]).indexOf(elVal)!==-1:PLAN_DATA[field]===elVal;
    el.style.borderColor=sel?'var(--red)':'var(--bdr)';
    el.style.background=sel?'rgba(184,23,46,.06)':'#fff';
    el.style.boxShadow=sel?'0 4px 16px rgba(184,23,46,.15)':'';
    var titleEl=el.querySelector('div>div:first-child')||el.querySelector('div');
    if(titleEl) titleEl.style.color=sel?'var(--red)':'var(--txt)';
  });
  updatePlanSummary();
}

function updatePlanSummary(){
  var el=document.getElementById('planSummaryContent');
  if(!el)return;
  var SEGS_={groupe:'🧭 Voyage Groupe',weekend:'🌙 Weekend à Thème',express:'⚡ Activité Express',mesure:'✂️ Sur Mesure',team:'🤝 Team Building'};
  var TYPES_={desert:'🏜️ Désert',mountain:'⛰️ Montagne',coastal:'🌊 Côte Atlantique',cultural:'🏛️ Villes & Culture'};
  var GROUPS_={solo:'🧑 Solo',couple:'💑 Couple',small:'👨‍👩‍👧 3–6 pers.',medium:'👥 7–15 pers.',large:'🏢 16–50 pers.',corp:'🤝 Corporate'};
  var DURS_={half:'☀️ Demi-journée',full:'🌤️ 1 journée',wknd:'🌙 2–3 jours',week:'🗓️ 4–7 jours',long:'✈️ 8+ jours',flex:'🔄 Flexible'};
  var BUDGETS_={eco:'🌱 < 500 MAD',mid:'🌿 500–1500 MAD',comfort:'⭐ 1500–3000 MAD',premium:'✨ 3000–5000 MAD',luxury:'💎 5000+ MAD',discuss:'💬 À discuter'};
  var rows=[];
  if(PLAN_DATA.seg) rows.push('<span style="color:#fff;font-weight:600">Segment :</span> '+SEGS_[PLAN_DATA.seg]);
  if((PLAN_DATA.type||[]).length) rows.push('<span style="color:#fff;font-weight:600">Destinations :</span> '+(PLAN_DATA.type||[]).map(function(t){return TYPES_[t]||t;}).join(', '));
  if(PLAN_DATA.group) rows.push('<span style="color:#fff;font-weight:600">Groupe :</span> '+GROUPS_[PLAN_DATA.group]);
  if(PLAN_DATA.dur) rows.push('<span style="color:#fff;font-weight:600">Durée :</span> '+DURS_[PLAN_DATA.dur]);
  if(PLAN_DATA.budget) rows.push('<span style="color:#fff;font-weight:600">Budget :</span> '+BUDGETS_[PLAN_DATA.budget]);
  var df=document.getElementById('planDateFrom');var dt=document.getElementById('planDateTo');
  if(df&&df.value) rows.push('<span style="color:#fff;font-weight:600">Dates :</span> '+df.value+(dt&&dt.value?' → '+dt.value:''));
  el.innerHTML=rows.length?rows.map(function(r){return '<div style="padding:3px 0">'+r+'</div>';}).join('') :'Complétez les étapes précédentes pour voir le récapitulatif.';
}

function addInspTag(tag){
  var ta=document.getElementById('planMsg');
  if(!ta)return;
  ta.value=(ta.value?ta.value+', '+tag:tag);
  ta.focus();
}

function goStep(n){
  /* Validate only going forward */
  if(n===1 && !PLAN_DATA.seg){ toast('Choisissez un type de voyage','warn'); return; }
  /* Hide all steps explicitly */
  for(var i=0;i<4;i++){var s=document.getElementById('step'+i);if(s)s.style.display='none';}
  var step=document.getElementById('step'+n);
  if(step) step.style.display='block';
  /* Update stepper */
  ['pStep0','pStep1','pStep2','pStep3'].forEach(function(id,i){
    var el=document.getElementById(id);
    if(!el) return;
    var active=i===n, done=i<n;
    el.style.color=active?'var(--sand)':done?'rgba(255,255,255,.5)':'rgba(255,255,255,.22)';
    var dot=el.querySelector('span');
    if(dot){
      dot.style.background=active?'var(--red)':done?'rgba(255,255,255,.18)':'rgba(255,255,255,.07)';
      dot.style.color=active?'#fff':done?'rgba(255,255,255,.8)':'rgba(255,255,255,.28)';
      dot.style.borderColor=active?'var(--red)':done?'rgba(255,255,255,.3)':'rgba(255,255,255,.1)';
      dot.textContent=done?'✓':''+(i+1);
    }
    var lbl=el.querySelector('div');
    if(lbl) lbl.style.color=active?'var(--sand)':done?'rgba(255,255,255,.5)':'rgba(255,255,255,.22)';
  });
  var track=document.getElementById('pStepTrack');
  if(track) track.style.width=['0%','33.5%','67%','100%'][n]||'0%';
  if(n===2) updatePlanSummary();
  /* Scroll to form */
  var formEl=document.getElementById('step'+n);
  if(formEl){var y=formEl.getBoundingClientRect().top+window.scrollY-120;window.scrollTo({top:Math.max(0,y),behavior:'smooth'});}
}

function submitPlanTrip(){
  var fn=(document.getElementById('planFn')||{value:''}).value||'';
  var ln=(document.getElementById('planLn')||{value:''}).value||'';
  var em=(document.getElementById('planEm')||{value:''}).value||'';
  var ph=(document.getElementById('planPh')||{value:''}).value||'';
  var nat=(document.getElementById('planNat')||{value:''}).value||'';
  var src=(document.getElementById('planSource')||{value:''}).value||'';
  var msg=(document.getElementById('planMsg')||{value:''}).value||'';
  var df=(document.getElementById('planDateFrom')||{value:''}).value||'';
  var dt=(document.getElementById('planDateTo')||{value:''}).value||'';
  var consent=document.getElementById('planConsent');
  if(!fn){toast('Entrez votre prenom','warn');return;}
  if(!em||!em.includes('@')){toast('Email invalide','warn');return;}
  if(!ph){toast('Numero de telephone requis','warn');return;}
  if(consent&&!consent.checked){toast('Veuillez accepter les conditions de contact','warn');return;}
  var city=(document.getElementById('planCity')||{value:''}).value||'';
  var dest=(document.getElementById('planDest')||{value:''}).value||PLAN_DATA.dest||'';
  apiPost('/forms/plan',{
    segment:PLAN_DATA.seg,moods:PLAN_DATA.mood||[],who:PLAN_DATA.who,
    destination:dest,groupSize:PLAN_DATA.group,
    duration:PLAN_DATA.dur,budget:PLAN_DATA.budget,lang:PLAN_DATA.lang,
    dateFrom:df,dateTo:dt,departCity:city,
    fname:fn,lname:ln,email:em,phone:ph,source:src,message:msg
  }).then(function(d){
    var ref=d.ref||('RC-PLAN-'+Math.random().toString(36).substr(2,4).toUpperCase());
    var refEl=document.getElementById('planRef');
    if(refEl)refEl.textContent=ref;
    goStep(3);
    toast('Demande envoyee ! Ref : '+ref);
    var waMsg='Demande Plan My Trip\nRef : '+ref+'\nNom : '+fn+'\nEmail : '+em+'\nTel : '+ph+'\nSegment : '+(PLAN_DATA.seg||'-')+'\nBudget : '+(PLAN_DATA.budget||'-');
    setTimeout(function(){
      if(confirm('Envoyer aussi sur WhatsApp pour confirmation immediate ?'))
        window.open(waUrl(waMsg),'_blank');
    },800);
  }).catch(function(err){toast('Erreur : '+(err.message||'Reessayez'),'warn');});
}


function submitContact(){
  var fn=v('cFn'),ln=v('cLn'),em=v('cEm'),ph=v('cPh'),ms=v('cMs');
  var sel=document.getElementById('cTy');
  if(!fn){toast('Entrez votre prénom','warn');return;}
  if(!em||!em.includes('@')){toast('Email invalide','warn');return;}
  if(!ms){toast('Écrivez votre message','warn');return;}
  apiPost('/forms/contact',{fname:fn,lname:ln||'',email:em,phone:ph||'',subject:sel?sel.value:'',message:ms})
    .then(function(){
      toast('Message envoyé ! Réponse sous 24h.');
      ['cFn','cLn','cEm','cPh','cMs'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
      if(sel)sel.value='';
    }).catch(function(err){toast('Erreur : '+err.message,'warn');});
}

/* ── Plan helpers ─────────────────────────────── */
var PLAN_DATA = {seg:'',mood:[],who:'',dest:'',group:'',dur:'',budget:'',lang:'',dateFrom:'',dateTo:'',city:''};
var PLAN_STEP  = 0;

function planShake(el){
  if(!el)return;
  var f=[0,6,-6,4,-4,2,-2,0],i=0;
  (function t(){el.style.transform='translateX('+f[i]+'px)';if(++i<f.length)setTimeout(t,40);else el.style.transform='';})();
}

function planPick(field,val){
  var multiFields=['mood'];
  if(multiFields.indexOf(field)!==-1){
    var arr=PLAN_DATA[field]||[];
    var idx=arr.indexOf(val);
    if(idx===-1)arr.push(val);else arr.splice(idx,1);
    PLAN_DATA[field]=arr;
  }else{
    PLAN_DATA[field]=val;
  }
  var picker=document.getElementById(field+'PickerF');
  if(!picker)return;
  picker.querySelectorAll('.plan-opt').forEach(function(el){
    var elVal=el.dataset.val;
    var sel=multiFields.indexOf(field)!==-1?(PLAN_DATA[field]||[]).indexOf(elVal)!==-1:PLAN_DATA[field]===elVal;
    if(field==='mood'){
      el.style.borderColor=sel?'var(--red)':'transparent';
      el.style.boxShadow=sel?'0 0 0 3px rgba(184,23,46,.4),0 8px 24px rgba(0,0,0,.25)':'0 4px 18px rgba(0,0,0,.18)';
      var chk=el.querySelector('.mood-check');
      if(chk){chk.style.background=sel?'var(--red)':'rgba(0,0,0,.45)';chk.style.borderColor=sel?'var(--red)':'rgba(255,255,255,.4)';chk.textContent=sel?'✓':'';}
    }else{
      el.style.borderColor=sel?'var(--red)':'var(--bdr)';
      el.style.background=sel?'rgba(184,23,46,.05)':'#fff';
      el.style.boxShadow=sel?'0 4px 16px rgba(184,23,46,.12)':'';
      var title=el.querySelector('div>div:first-child')||el.querySelector('div');
      if(title)title.style.color=sel?'var(--red)':'var(--txt)';
    }
  });
  updatePlanSummary();
}

  var MOODS_={desert:'🏜️ Désert & Sahara',mountain:'⛰️ Atlas & Randonnée',coastal:'🌊 Côte Atlantique',culture:'🏛️ Villes Impériales',nature:'🌿 Oasis & Vallées',surprise:'✨ Surprise'};

  var DURS_={half:'☀️ Demi-journée',full:'🌤️ 1 journée',wknd:'🌙 2–3 jours',week:'🗓️ 4–7 jours',long:'✈️ 8+ jours',flex:'🔄 Flexible'};
  var BUDGETS_={eco:'🌱 < 500 MAD',mid:'🌿 500–1500 MAD',comfort:'⭐ 1500–3000 MAD',premium:'✨ 3000–5000 MAD',luxury:'💎 5000+ MAD',discuss:'💬 À discuter'};
  var rows=[];
  if((PLAN_DATA.mood||[]).length)rows.push('<span style="color:#fff;font-weight:600">Ambiance :</span> '+(PLAN_DATA.mood||[]).map(function(m){return MOODS_[m]||m;}).join(', '));
  if(PLAN_DATA.who)rows.push('<span style="color:#fff;font-weight:600">Voyage :</span> '+WHOS_[PLAN_DATA.who]);
  var destEl=document.getElementById('planDest');
  if(destEl&&destEl.value)rows.push('<span style="color:#fff;font-weight:600">Destination :</span> 📍 '+destEl.value);
  else if(PLAN_DATA.dest)rows.push('<span style="color:#fff;font-weight:600">Destination :</span> 📍 '+PLAN_DATA.dest);
  if(PLAN_DATA.seg)rows.push('<span style="color:#fff;font-weight:600">Programme :</span> '+SEGS_[PLAN_DATA.seg]);
  if(PLAN_DATA.group)rows.push('<span style="color:#fff;font-weight:600">Groupe :</span> '+GROUPS_[PLAN_DATA.group]);
  if(PLAN_DATA.dur)rows.push('<span style="color:#fff;font-weight:600">Durée :</span> '+DURS_[PLAN_DATA.dur]);
  if(PLAN_DATA.budget)rows.push('<span style="color:#fff;font-weight:600">Budget :</span> '+BUDGETS_[PLAN_DATA.budget]);
  var df=document.getElementById('planDateFrom'),dt=document.getElementById('planDateTo');
  if(df&&df.value)rows.push('<span style="color:#fff;font-weight:600">Dates :</span> '+df.value+(dt&&dt.value?' → '+dt.value:''));
  el.innerHTML=rows.length?rows.map(function(r){return '<div style="padding:3px 0">'+r+'</div>';}).join(''):'Complétez les étapes précédentes pour voir le récapitulatif.';
}

function addInspTag(tag){
  var ta=document.getElementById('planMsg');
  if(!ta)return;
  ta.value=(ta.value?ta.value+', '+tag:tag);
  ta.focus();
}

function goStep(n){
  var cur=PLAN_STEP;
  if(n>cur){
    if(cur===0){
      if(!(PLAN_DATA.mood&&PLAN_DATA.mood.length)){planShake(document.getElementById('moodPickerF'));toast('Choisissez au moins une ambiance','warn');return;}
      if(!PLAN_DATA.who){planShake(document.getElementById('whoPickerF'));toast('Précisez avec qui vous voyagez','warn');return;}
    }
    if(cur===1){
      var m=[];
      if(!PLAN_DATA.group)m.push('la taille du groupe');
      if(!PLAN_DATA.dur)m.push('la durée');
      if(!PLAN_DATA.budget)m.push('le budget');
      if(m.length){toast('Sélectionnez : '+m.join(', '),'warn');return;}
    }
  }
  PLAN_STEP=n;
  for(var i=0;i<4;i++){var s=document.getElementById('step'+i);if(s)s.style.display='none';}
  var step=document.getElementById('step'+n);
  if(step)step.style.display='block';
  ['pStep0','pStep1','pStep2','pStep3'].forEach(function(id,i){
    var el=document.getElementById(id);if(!el)return;
    var active=i===n,done=i<n;
    var dot=el.querySelector('span');
    if(dot){
      dot.style.background=active?'var(--red)':done?'rgba(255,255,255,.18)':'rgba(255,255,255,.07)';
      dot.style.color=active?'#fff':done?'rgba(255,255,255,.8)':'rgba(255,255,255,.28)';
      dot.style.borderColor=active?'var(--red)':done?'rgba(255,255,255,.3)':'rgba(255,255,255,.1)';
      dot.textContent=done?'✓':''+(i+1);
    }
    var lbl=el.querySelector('div');
    if(lbl)lbl.style.color=active?'var(--sand)':done?'rgba(255,255,255,.5)':'rgba(255,255,255,.22)';
  });
  var track=document.getElementById('pStepTrack');
  if(track)track.style.width=['0%','33.5%','67%','100%'][n]||'0%';
  if(n===2)updatePlanSummary();
  var formEl=document.getElementById('step'+n);
  if(formEl){var y=formEl.getBoundingClientRect().top+window.scrollY-120;window.scrollTo({top:Math.max(0,y),behavior:'smooth'});}
}

/* Render dash trip cards */
function renderDashTrips(res, nextTrip, resExp, segBadge, typeBadge, now){
  return res.map(function(r){
    var exp=resExp(r);
    var isPast=new Date(r.date)<now;
    var isUpcoming=!isPast&&r.status!=='cancelled';
    var daysLeft=isUpcoming?Math.max(0,Math.round((new Date(r.date)-now)/(1000*60*60*24))):null;
    var isNext=nextTrip&&r.id===nextTrip.id;
    return '<div class="dtr" style="background:#fff;border:1px solid '+(isNext?'var(--red)':'var(--bdr)')+';border-radius:16px;overflow:hidden;margin-bottom:13px;transition:box-shadow .2s" onmouseover="this.style.boxShadow=\'var(--sh2)\'" onmouseout="this.style.boxShadow=\'\'">'
      +(exp.img?'<div style="height:120px;overflow:hidden;position:relative"><img src="'+exp.img+'" style="width:100%;height:100%;object-fit:cover"><div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(0,0,0,.55))"><div style="position:absolute;bottom:10px;left:14px;right:14px;display:flex;align-items:flex-end;justify-content:space-between"><div style="font-family:\'Cormorant Garamond\',serif;font-size:18px;font-weight:600;color:#fff">'+r.expTitle+'</div>'+(daysLeft!==null&&daysLeft<=30?'<div style="background:rgba(184,23,46,.85);color:#fff;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700">'+daysLeft+'j</div>':'')+'</div></div></div>':'')
      +'<div style="padding:13px 15px">'
        +'<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:9px">'
          +segBadge(exp)+typeBadge(exp)

          +[['📅',fmtDt(r.date)],['👥',r.adults+' pers.'],['💰',r.total.toLocaleString()+' MAD']].map(function(s){

          }).join('')
        +'</div>'
        +(r.notes?'<div style="background:rgba(217,119,6,.07);border-left:3px solid #D97706;border-radius:0 8px 8px 0;padding:7px 10px;font-size:12px;color:var(--txt);margin-bottom:9px"><span style="font-weight:700;color:#D97706">📝 </span>'+r.notes+'</div>':'')
        +'<div style="display:flex;gap:7px;flex-wrap:wrap">'
          +(r.status!=='cancelled'?'<a href="'+waUrl('Bonjour, question sur la réservation '+r.id+' — '+r.expTitle)+'" target="_blank" class="btn btn-s btn-sm">💬 Support</a>':'')
          +(r.status==='confirmed'&&isUpcoming?'<button class="btn btn-s btn-sm" onclick="openBk(\''+r.expId+'\')">↻ Réserver à nouveau</button>':'')
          +(r.status!=='cancelled'?'<button class="btn btn-sm" style="background:rgba(220,38,38,.08);color:#DC2626;border-radius:100px;padding:5px 12px;font-size:11px;font-weight:600" onclick="if(confirm(\'Annuler cette réservation ?\'))cancelRes('+r.id+')">Annuler</button>':'')

function filterDashTrips(seg, btn){
  btn.parentElement.querySelectorAll('button').forEach(function(b){b.style.background='#fff';b.style.color='var(--mut)';b.style.borderColor='var(--bdr)';});
  btn.style.background='var(--red)';btn.style.color='#fff';btn.style.borderColor='var(--red)';
  var u=ST.user;
  var myRes=ST.res.filter(function(r){return r.email===u.email;});
  var filtered=seg==='all'?myRes:myRes.filter(function(r){
    var e=EXP.find(function(x){return x.id===r.expId;})||{};
    return e.segment===seg;
  });
  var nextTrip=myRes.filter(function(r){return r.status!=='cancelled'&&new Date(r.date)>=new Date();}).sort(function(a,b){return new Date(a.date)-new Date(b.date);})[0]||null;
  var SEGS_={groupe:{label:'Voyage Groupe',icon:'🧭',color:'var(--red)'},weekend:{label:'Weekend à Thème',icon:'🌙',color:'#7C3AED'},express:{label:'Activité Express',icon:'⚡',color:'var(--sage)'},mesure:{label:'Sur Mesure',icon:'✂️',color:'#2563EB'},team:{label:'Team Building',icon:'🤝',color:'#D97706'}};
  var TYPE_ICONS_={desert:'🏜️',mountain:'⛰️',coastal:'🌊',cultural:'🏛️'};
  function sb(exp){if(!exp||!exp.segment)return'';var s=SEGS_[exp.segment]||{label:exp.segment,icon:'✦',color:'var(--red)'};return '<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;background:'+s.color+';color:#fff">'+s.icon+' '+s.label+'</span>';}
  function tb(exp){if(!exp||!exp.type)return'';return '<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600;background:var(--cream);color:var(--txt)">'+(TYPE_ICONS_[exp.type]||'🗺️')+' '+exp.type+'</span>';}
  function re(r){return EXP.find(function(e){return e.id===r.expId;})||{};}
  var el=document.getElementById('dashTripsList');
  if(el) el.innerHTML=filtered.length?renderDashTrips(filtered,nextTrip,re,sb,tb,new Date()):'<div style="text-align:center;padding:36px;color:var(--mut)">Aucune réservation dans cette catégorie.</div>';
}

/* ── Sur Mesure requests loader ─────────────── */
function loadPlanReqs(){
  var el = document.getElementById('planReqsContainer');
  if(!el) return;

    el.innerHTML = renderPlanReqs(d.requests||[]);

  });
}

function renderPlanReqs(reqs){

      +'<div style="font-size:14px;color:var(--mut);max-width:320px;margin:0 auto 22px;line-height:1.65">Décrivez votre voyage idéal et notre équipe vous prépare un programme 100% personnalisé.</div>'
      +'<button class="btn btn-r" onclick="go(\'plan\')">✂️ Faire ma demande Sur Mesure</button>'
    +'</div>';

    'contacted': {label:'Équipe en contact', color:'#16A34A', bg:'#DCFCE7', icon:'📞'},
    'confirmed': {label:'Programme confirmé',color:'#16A34A', bg:'#DCFCE7', icon:'✅'},
    'rejected':  {label:'Non retenu',        color:'#94A3B8', bg:'#F1F5F9', icon:'❌'}

    var s = statusCfg[r.status] || {label:r.status, color:'#64748B', bg:'#F1F5F9', icon:'📋'};

      /* Header */
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px">'
        +'<div>'
          +'<div style="font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--mut);text-transform:uppercase;margin-bottom:4px">Réf. '+r.id+'</div>'
          +'<div style="font-family:\'Cormorant Garamond\',serif;font-size:19px;font-weight:600;color:var(--txt)">'+(r.destination||'Voyage Sur Mesure')+'</div>'
          +'<div style="font-size:12px;color:var(--mut);margin-top:2px">📅 Demande du '+dateStr+'</div>'
        +'</div>'
        +'<div style="flex-shrink:0;display:inline-flex;align-items:center;gap:5px;background:'+s.bg+';color:'+s.color+';padding:5px 12px;border-radius:100px;font-size:12px;font-weight:700;white-space:nowrap">'+s.icon+' '+s.label+'</div>'
      +'</div>'
      /* Details grid */
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">'
        +(r.duration?'<div style="background:var(--warm);border-radius:10px;padding:10px 12px"><div style="font-size:10px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">Durée</div><div style="font-size:13px;font-weight:600;color:var(--txt)">⏱ '+r.duration+'</div></div>':'')
        +(r.budget?'<div style="background:var(--warm);border-radius:10px;padding:10px 12px"><div style="font-size:10px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">Budget</div><div style="font-size:13px;font-weight:600;color:var(--txt)">💰 '+r.budget+'</div></div>':'')

function cancelRes(id){
  var doCancel=function(){
    apiPatch('/bookings/'+id+'/cancel',{}).catch(function(){});
    ST.res=ST.res.map(function(r){return r.id===id?Object.assign({},r,{status:'cancelled'}):r;});
    localStorage.setItem('rc_res',JSON.stringify(ST.res));
    go('dashboard',ST.dTab);
    toast('Réservation annulée.');
  };
  doCancel();
}


/* ── API HELPERS ─────────────────────────────── */
var API_BASE = '/api';

function apiPost(path, body) {
  var token = localStorage.getItem('rc_token');
  var headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  return fetch(API_BASE + path, { method: 'POST', headers: headers, body: JSON.stringify(body) })
    .then(function(r){ return r.json().then(function(d){ if(!r.ok) throw new Error(d.error||'Error'); return d; }); });
}
function apiGet(path) {
  var token = localStorage.getItem('rc_token');
  var headers = {};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  return fetch(API_BASE + path, { headers: headers })
    .then(function(r){ return r.json().then(function(d){ if(!r.ok) throw new Error(d.error||'Error'); return d; }); });
}
function apiPatch(path, body) {
  var token = localStorage.getItem('rc_token');
  var headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  return fetch(API_BASE + path, { method: 'PATCH', headers: headers, body: JSON.stringify(body) })
    .then(function(r){ return r.json().then(function(d){ if(!r.ok) throw new Error(d.error||'Error'); return d; }); });
}

/* Restore session from token on page load */
function restoreSession() {
  var token = localStorage.getItem('rc_token');
  if (!token) return;
  apiGet('/auth/me').then(function(d){
    ST.user = d.user;
    syncNav();
  }).catch(function(){
    localStorage.removeItem('rc_token');
    localStorage.removeItem('rc_user');
  });
}


/* BOOT */

restoreSession();
loadExperiencesFromApi();
loadSiteConfig();
go('home');
syncNav();

function loadSiteConfig(){
  fetch('/api/site-config').then(function(r){ return r.json(); }).then(function(d){
    Object.assign(SETTINGS, d);
    /* Apply SEO tags */
    if(d.seoTitle)       document.title = d.seoTitle;
    var dm = document.querySelector('meta[name="description"]');
    if(dm && d.seoDescription) dm.setAttribute('content', d.seoDescription);
    var km = document.querySelector('meta[name="keywords"]');
    if(km && d.seoKeywords) km.setAttribute('content', d.seoKeywords);
    /* Re-render current page so all CMS text + contact info updates */
    go(ST.pg, ST.param);
    /* Update floating WA button href */
    var waBtn = document.getElementById('floatingWA');
    if(waBtn) waBtn.href = waUrl('Bonjour Roamers Community!');
  }).catch(function(){/* keep defaults */});
}

/* Replace the embedded EXP fallback with the live catalog from the API. */
function loadExperiencesFromApi(){
  apiGet('/experiences').then(function(d){
    if(!d || !Array.isArray(d.experiences) || !d.experiences.length) return;
    EXP.length = 0;
    d.experiences.forEach(function(e){
      if(!e.dates) e.dates = [];
      if(!e.dif)   e.dif   = 'Facile';
      EXP.push(e);
    });
    if(ST.pg==='experiences' || ST.pg==='exp-detail' || ST.pg==='home'){
      var app=document.getElementById('app');
      if(app){ app.innerHTML = render(); setTimeout(initReveal,80); }
    }
  }).catch(function(){ /* keep embedded fallback */ });
}

/* ── PWA INSTALL PROMPT ── */
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  deferredPrompt = e;
  var banner = document.getElementById('installBanner');
  if(banner) banner.style.display = 'flex';
});
window.addEventListener('appinstalled', function(){
  var banner = document.getElementById('installBanner');
  if(banner) banner.style.display = 'none';
  deferredPrompt = null;
  toast('Roamers Community installed successfully!');
});
function installApp(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(r){
    if(r.outcome === 'accepted') toast('Installing Roamers Community...');
    deferredPrompt = null;
    var banner = document.getElementById('installBanner');
    if(banner) banner.style.display = 'none';
  });
}
function dismissInstall(){
  var banner = document.getElementById('installBanner');
  if(banner) banner.style.display = 'none';
}
</script>

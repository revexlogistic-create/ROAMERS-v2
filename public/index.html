<style>
/* ═══════════════════════════════════════════
   ROAMERS COMMUNITY — Design System v2
═══════════════════════════════════════════ */
:root{
  /* Brand */
  --red:#B8172E; --red-d:#8A1021; --red-l:rgba(184,23,46,.08); --red-m:rgba(184,23,46,.18);
  --sand:#D9B87A; --sand-l:rgba(217,184,122,.12);
  --sage:#3D6B35; --sage-l:rgba(61,107,53,.09);
  --amber:#D97706; --amber-l:rgba(217,119,6,.1);
  --blue:#2563EB; --blue-l:rgba(37,99,235,.08);
  --purple:#7C3AED; --purple-l:rgba(124,58,237,.08);
  /* Surface */
  --blk:#080808; --dk:#101010; --dk2:#181818;
  --cream:#F6F0E7; --warm:#FAF7F2; --white:#fff;
  /* Text */
  --txt:#111111; --txt2:#3A3632; --mut:#7A7067; --muted:rgba(0,0,0,.38);
  /* Border */
  --bdr:#E5DDD2; --bdr2:rgba(0,0,0,.07);
  /* Radius */
  --r:16px; --r-sm:10px; --r-lg:22px; --r-xl:28px;
  /* Shadow */
  --sh:0 2px 16px rgba(0,0,0,.06), 0 1px 4px rgba(0,0,0,.04);
  --sh2:0 12px 48px rgba(0,0,0,.12), 0 4px 16px rgba(0,0,0,.06);
  --sh3:0 24px 80px rgba(0,0,0,.18);
  /* Timing */
  --ease:.22s cubic-bezier(.25,.1,.25,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',sans-serif;background:var(--warm);color:var(--txt);overflow-x:hidden;line-height:1.6}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}
h1,h2,h3,h4{font-family:'Cormorant Garamond',serif;font-weight:600;line-height:1.1;letter-spacing:-.01em}

/* ── LAYOUT ── */
.sec{padding:96px 5%}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:start}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.fi-area{resize:vertical}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;border-radius:100px;font-size:13px;font-weight:600;letter-spacing:.04em;transition:all var(--ease);cursor:pointer;border:none;white-space:nowrap;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.12);opacity:0;transition:opacity .15s}
.btn:hover::after{opacity:1}
.btn-r{background:var(--red);color:#fff;box-shadow:0 2px 12px rgba(184,23,46,.25)}
.btn-r:hover{background:var(--red-d);transform:translateY(-2px);box-shadow:0 6px 22px rgba(184,23,46,.35)}
.btn-k{background:var(--blk);color:#fff}
.btn-k:hover{background:#222;transform:translateY(-1px)}
.btn-s{background:transparent;color:var(--txt);border:1.5px solid var(--bdr)}
.btn-s:hover{border-color:var(--red);color:var(--red);background:var(--red-l)}
.btn-o{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.3)}
.btn-o:hover{border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.08)}
.btn-w{background:#fff;color:var(--red)}
.btn-w:hover{background:var(--cream)}
.btn-full{width:100%}
.btn-lg{padding:15px 36px;font-size:14px}
.btn-sm{padding:7px 16px;font-size:12px}

/* ── TYPE ── */
.eye{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.18em;color:var(--red);text-transform:uppercase;margin-bottom:12px}
.eye::before{content:'';width:20px;height:1.5px;background:var(--red)}
.eye-s{color:var(--sand)}
.eye-s::before{background:var(--sand)}
.h1{font-size:clamp(44px,6vw,92px);line-height:.95}
.h2{font-size:clamp(28px,3.5vw,50px)}
.h3{font-size:clamp(20px,2vw,32px)}
em.r{color:var(--red);font-style:italic}
em.s{color:var(--sand);font-style:italic}
.desc{font-size:16px;color:var(--mut);line-height:1.8;margin-top:14px;font-weight:300}
.cap{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}

/* ── NAV — transparent on hero, solid on scroll / other pages ── */
#nav{
  position:fixed;top:0;left:0;right:0;z-index:900;
  height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 4%;
  background:transparent;transition:background .4s,backdrop-filter .4s,box-shadow .4s;
}
#nav.solid{background:rgba(6,6,6,.96);backdrop-filter:blur(20px) saturate(180%);box-shadow:0 1px 0 rgba(255,255,255,.06)}

/* ── LOGO ── */
.n-logo{display:flex;flex-direction:column;align-items:flex-start;gap:2px;text-decoration:none;flex-shrink:0;line-height:1}
.n-logo img{
  height:38px;width:auto;object-fit:contain;
  mix-blend-mode:screen;
  filter:brightness(1.08) drop-shadow(0 1px 8px rgba(184,23,46,.25));
  transition:transform var(--ease),filter var(--ease);
}
.n-logo:hover img{transform:scale(1.04);filter:brightness(1.15) drop-shadow(0 2px 12px rgba(184,23,46,.4))}
.n-logo-sub{font-family:'DM Sans',sans-serif;font-size:8.5px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.45);white-space:nowrap;padding-left:1px}
/* Fallback wordmark */
.n-logo-fb{display:none;align-items:center;gap:10px}
.n-logo-fb .lm{
  width:38px;height:38px;background:var(--red);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',cursive;color:#fff;font-size:17px;letter-spacing:.05em;
  box-shadow:0 3px 12px rgba(184,23,46,.4);flex-shrink:0;
}
.n-logo-fb .lt{display:flex;flex-direction:column;line-height:1}
.n-logo-fb .lt-main{font-family:'Bebas Neue',cursive;font-size:19px;letter-spacing:.12em;color:#fff}
.n-logo-fb .lt-sub{font-size:7px;letter-spacing:.3em;color:var(--sand);text-transform:uppercase;margin-top:1px}

/* ── NAV LINKS ── */
.nl{display:flex;align-items:center;gap:2px;list-style:none}
.nl li a,.nl li button{
  font-size:12.5px;font-weight:500;color:rgba(255,255,255,.72);
  padding:7px 12px;border-radius:8px;transition:all .2s;display:block;
  font-family:'DM Sans',sans-serif;letter-spacing:.01em;
}
.nl li a:hover,.nl li button:hover{color:#fff;background:rgba(255,255,255,.08)}
.nl li a.act{color:var(--sand);font-weight:600}
.nl .nbtn{margin-left:6px}
.nl .nbtn a{
  background:var(--red);color:#fff !important;
  padding:8px 20px;border-radius:100px;
  box-shadow:0 2px 12px rgba(184,23,46,.35);
  transition:all .2s !important;
}
.nl .nbtn a:hover{background:var(--red-d) !important;transform:translateY(-1px);box-shadow:0 4px 18px rgba(184,23,46,.45) !important}
.n-badge{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:50%;margin-left:3px;vertical-align:middle}
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.burger span{display:block;width:22px;height:1.5px;background:#fff;border-radius:2px;transition:.3s}

/* ── USER DROPDOWN ── */
.u-wrap{position:relative}
.u-av{width:32px;height:32px;border-radius:50%;background:var(--red);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid rgba(255,255,255,.2);transition:all .2s}
.u-av:hover{border-color:var(--sand);box-shadow:0 0 0 3px rgba(217,184,122,.2)}
.u-dd{position:absolute;top:calc(100% + 10px);right:0;background:#fff;border-radius:var(--r);box-shadow:var(--sh3);min-width:210px;z-index:10;border:1px solid var(--bdr);overflow:hidden;display:none;animation:dropIn .2s ease}
@keyframes dropIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.u-dd.open{display:block}
.u-dd-hdr{padding:14px 16px;border-bottom:1px solid var(--bdr);background:linear-gradient(135deg,var(--cream),#fff)}
.u-dd-name{font-size:14px;font-weight:700;color:var(--txt)}
.u-dd-email{font-size:12px;color:var(--mut);margin-top:2px}
.u-dd-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;color:var(--txt);cursor:pointer;transition:background .15s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.u-dd-item:hover{background:var(--cream)}
.u-dd-sep{height:1px;background:var(--bdr);margin:3px 0}

/* ── SEARCH OVERLAY ── */
#appSearchOverlay{position:fixed;inset:0;z-index:960;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .25s}
#appSearchOverlay.open{opacity:1;pointer-events:all}
#appSearchBox{position:fixed;top:0;left:0;right:0;z-index:961;background:#fff;padding:12px 16px 16px;box-shadow:0 8px 32px rgba(0,0,0,.18);transform:translateY(-110%);transition:transform .32s cubic-bezier(.4,0,.2,1)}
#appSearchBox.open{transform:translateY(0)}
#appSearchBox .srch-row{display:flex;align-items:center;gap:10px;background:#f5f5f5;border-radius:100px;padding:10px 16px}
#appSearchBox .srch-row input{flex:1;border:none;background:none;outline:none;font-size:16px;color:#111;font-family:inherit}
#appSearchBox .srch-row input::placeholder{color:#aaa}
#appSearchBox .srch-close{font-size:18px;color:#666;cursor:pointer;flex-shrink:0;padding:2px 4px}
#appSearchResults{margin-top:12px;max-height:60vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.srch-item{display:flex;align-items:center;gap:12px;padding:10px 4px;cursor:pointer;border-bottom:1px solid #f0f0f0}
.srch-item:last-child{border-bottom:none}
.srch-item img{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0}
.srch-item-body{flex:1;min-width:0}
.srch-item-title{font-size:14px;font-weight:600;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srch-item-sub{font-size:12px;color:#888;margin-top:2px}
.srch-empty{text-align:center;padding:24px 0;color:#aaa;font-size:14px}

/* ── MOBILE MENU ── */
#mob{position:fixed;inset:0;background:#070707;z-index:950;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transform:translateX(100%);transition:transform .4s cubic-bezier(.77,0,.18,1)}
#mob.open{transform:translateX(0)}
#mob .mc{position:absolute;top:22px;right:5%;font-size:22px;color:rgba(255,255,255,.6);cursor:pointer;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.06);transition:all .2s}
#mob .mc:hover{color:#fff;background:rgba(255,255,255,.12)}
/* Mobile logo */
#mob .mob-logo{margin-bottom:24px;text-align:center}
#mob .mob-logo img{height:52px;margin:0 auto;filter:brightness(1.1)}
#mob .mob-logo .mob-lw{display:none;flex-direction:column;align-items:center;gap:6px}
#mob .mob-logo .mob-lw .lm{width:48px;height:48px;background:var(--red);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;color:#fff;font-size:22px;box-shadow:0 6px 24px rgba(184,23,46,.4)}
#mob .mob-logo .mob-lw .lt-main{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:.15em;color:#fff}
#mob .mob-logo .mob-lw .lt-sub{font-size:9px;letter-spacing:.3em;color:var(--sand)}
#mob button{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:rgba(255,255,255,.7);background:none;border:none;cursor:pointer;padding:7px 28px;transition:color .2s;letter-spacing:-.01em}
#mob button:hover{color:#fff}
#mob .mob-sep{width:40px;height:1px;background:rgba(255,255,255,.1);margin:8px 0}
#mob .mob-cta{font-size:16px;color:var(--sand) !important}

/* ── HERO ── */
.hero{position:relative;height:100vh;min-height:520px;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=1800&q=85') center/cover;transform:scale(1.04);animation:khz 11s ease forwards}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,.45) 0%,rgba(0,0,0,.2) 60%,rgba(0,0,0,.1) 100%)}
@keyframes khz{to{transform:scale(1)}}
.hero-c{position:absolute;z-index:2;top:calc(var(--topbar-h) + var(--safe-top) + 40px);bottom:calc(var(--tab-h) + var(--safe-bottom) + 8px);left:4%;right:4%}
.hero-glass{background:rgba(10,8,8,.52);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.13);border-radius:22px;padding:32px 18px 18px;box-shadow:0 8px 32px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.12)}
.hero .hero-glass{height:100%;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
.hero-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(217,184,122,.12);border:1px solid rgba(217,184,122,.28);border-radius:100px;padding:6px 16px;font-size:11px;font-weight:700;letter-spacing:.2em;color:var(--sand);text-transform:uppercase;margin-bottom:20px;backdrop-filter:blur(8px)}
.hero-tag::before{content:'';width:6px;height:6px;background:var(--red);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hero-sub{font-size:clamp(14px,1.55vw,17px);color:rgba(255,255,255,.65);max-width:500px;line-height:1.75;font-weight:300;margin:18px 0 34px}
.hero-acts{display:flex;gap:12px;flex-wrap:wrap}
.hero-stats{position:absolute;bottom:3vh;right:5%;display:flex;gap:20px;z-index:2}
@media(max-width:390px){
  .hero-glass{padding:16px 14px 14px;border-radius:16px}
  .hero-glass h1{font-size:clamp(22px,7vw,30px)!important;margin-bottom:8px!important}
  .hero-glass p{font-size:12.5px!important;line-height:1.5!important;margin-bottom:14px!important}
  .hero-glass .hero-pills{gap:5px!important}
  .hero-glass .hero-pills button{padding:6px 11px!important;font-size:11px!important}
  .hero-cta-row{flex-direction:column!important;gap:8px!important}
  .hero-main-cta,.hero-wa-cta{width:100%!important;justify-content:center!important;padding:12px 16px!important;font-size:13px!important;box-sizing:border-box!important}
  .hero-stats{display:none}
}
@media(max-width:360px){
  .hero-glass{padding:13px 12px 12px;border-radius:14px}
  .hero-glass h1{font-size:21px!important;margin-bottom:6px!important}
  .hero-glass p{font-size:12px!important;margin-bottom:11px!important}
  .hero-glass .hero-pills{gap:4px!important;margin-bottom:11px!important}
  .hero-glass .hero-pills button{padding:5px 9px!important;font-size:10.5px!important}
  .hero-main-cta,.hero-wa-cta{padding:10px 12px!important;font-size:12px!important}
}
.hs-n{font-family:'Bebas Neue',cursive;font-size:40px;color:#fff;display:block;line-height:1}
.hs-l{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.12em;text-transform:uppercase;margin-top:4px}
.hero-line{position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(217,184,122,.2),transparent)}

/* ── TRUST BAR ── */
.tbar{background:var(--dk);padding:16px 5%;display:flex;align-items:center;gap:20px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.04)}
.tbar-l{font-size:10px;letter-spacing:.18em;color:rgba(255,255,255,.25);text-transform:uppercase;white-space:nowrap;font-weight:600}
.tbar-logos{display:flex;gap:32px;flex-wrap:wrap}
.tbar-logo{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:.12em;color:rgba(255,255,255,.18)}

/* ── EXPERIENCE CARDS ── */
.ec{background:#fff;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh);transition:transform .35s var(--ease),box-shadow .35s var(--ease);cursor:pointer;display:flex;flex-direction:column;border:1px solid rgba(0,0,0,.04)}
.ec:hover{transform:translateY(-6px);box-shadow:var(--sh2)}
.ec-img{position:relative;aspect-ratio:4/3;overflow:hidden}
.ec-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease)}
.ec:hover .ec-img img{transform:scale(1.07)}
.ec-badge{position:absolute;top:12px;left:12px;padding:4px 12px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.b-r{background:var(--red);color:#fff}.b-g{background:var(--sage);color:#fff}.b-s{background:var(--sand);color:#111}
.ec-fav{position:absolute;top:12px;right:12px;width:34px;height:34px;background:rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 10px rgba(0,0,0,.14);transition:all .2s;cursor:pointer;backdrop-filter:blur(6px)}
.ec-fav:hover{transform:scale(1.15);background:#fff}
.ec-body{padding:18px 20px;flex:1;display:flex;flex-direction:column}
.ec-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.ec-tag{font-size:10px;font-weight:600;color:var(--sage);background:var(--sage-l);border-radius:5px;padding:2px 8px;letter-spacing:.03em}
.ec-title{font-size:16px;font-weight:700;margin-bottom:3px;line-height:1.25;color:var(--txt)}
.ec-loc{font-size:12px;color:var(--mut);margin-bottom:10px;display:flex;align-items:center;gap:4px}
.ec-meta{display:flex;align-items:center;justify-content:space-between;padding-top:11px;border-top:1px solid var(--bdr);margin-top:auto}
.ec-dur{font-size:12px;color:var(--mut)}
.ec-rat{font-size:12px;font-weight:600;color:var(--txt);display:flex;align-items:center;gap:3px}
.ec-rat .st{color:#F5A623}
.ec-price strong{font-size:17px;font-weight:700;display:block;text-align:right;color:var(--red)}
.ec-price span{font-size:11px;color:var(--mut);display:block;text-align:right}
.ec-foot{padding:0 20px 18px}

/* ── FILTER BAR ── */
.fbar{background:#fff;border-radius:100px;padding:6px 8px;display:flex;align-items:center;gap:4px;box-shadow:var(--sh);flex-wrap:wrap;margin-bottom:28px;border:1px solid var(--bdr)}
.ft{padding:8px 16px;border-radius:100px;font-size:13px;font-weight:500;color:var(--mut);cursor:pointer;transition:all .2s;white-space:nowrap;border:none;background:none;font-family:inherit}
.ft:hover{background:var(--cream);color:var(--txt)}
.ft.act{background:var(--red);color:#fff;box-shadow:0 2px 10px rgba(184,23,46,.25)}
.fsrch{flex:1;min-width:140px;border:none;outline:none;font-size:13px;color:var(--txt);padding:7px 12px;background:transparent}
.fsrch::placeholder{color:var(--mut)}

/* ── WHY CARDS ── */
.wc{background:#fff;border:1px solid var(--bdr);border-radius:var(--r-lg);padding:30px 26px;transition:all .3s}
.wc:hover{border-color:var(--red);box-shadow:0 8px 28px rgba(184,23,46,.09);transform:translateY(-3px)}
.wc-n{font-family:'Bebas Neue',cursive;font-size:56px;color:var(--red-l);line-height:1;margin-bottom:4px}
.wc-i{font-size:28px;margin:8px 0 12px}
.wc-t{font-size:16px;font-weight:700;margin-bottom:7px;color:var(--txt)}
.wc-d{font-size:13px;color:var(--mut);line-height:1.7}
.wc-dk{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
.wc-dk:hover{border-color:rgba(217,184,122,.3);box-shadow:0 8px 28px rgba(0,0,0,.2)}

/* ── TESTIMONIALS ── */
.tc{background:#fff;border:1px solid var(--bdr);border-radius:var(--r-lg);padding:26px;display:flex;flex-direction:column}
.tc-st{color:#F5A623;font-size:13px;letter-spacing:3px;margin-bottom:12px}
.tc-txt{font-size:14px;line-height:1.78;font-style:italic;flex:1;color:var(--txt2);quotes:"\201C""\201D"}
.tc-txt::before{content:open-quote;font-size:40px;font-family:'Cormorant Garamond',serif;color:var(--red-m);line-height:.1;vertical-align:-.4em;margin-right:4px}
.tc-foot{display:flex;align-items:center;gap:11px;margin-top:17px;padding-top:14px;border-top:1px solid var(--bdr)}
.tc-av{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--bdr)}
.tc-n{font-size:13px;font-weight:700;color:var(--txt)}
.tc-r{font-size:12px;color:var(--mut);margin-top:1px}
.tc-dk{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.07)}
.tc-dk .tc-txt{color:rgba(255,255,255,.75)}
.tc-dk .tc-foot{border-top-color:rgba(255,255,255,.08)}
.tc-dk .tc-n{color:#fff}

/* ── STAT CARD ── */
.sc{text-align:center;padding:24px 18px;background:rgba(255,255,255,.04);border-radius:var(--r-lg);border:1px solid rgba(255,255,255,.07)}
.sc-n{font-family:'Bebas Neue',cursive;font-size:52px;color:var(--sand);display:block;line-height:1}
.sc-l{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.12em;text-transform:uppercase;margin-top:6px}

/* ── BLOG CARDS ── */
.bc{background:#fff;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh);transition:transform .3s,box-shadow .3s;cursor:pointer;display:flex;flex-direction:column;border:1px solid rgba(0,0,0,.04)}
.bc:hover{transform:translateY(-4px);box-shadow:var(--sh2)}
.bc-img{aspect-ratio:16/9;overflow:hidden}
.bc-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.bc:hover .bc-img img{transform:scale(1.06)}
.bc-body{padding:20px 22px 24px;flex:1;display:flex;flex-direction:column}
.bc-cat{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--red);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.bc-cat::before{content:'';width:14px;height:1.5px;background:var(--red)}
.bc-title{font-size:17px;font-weight:700;line-height:1.3;margin-bottom:8px;color:var(--txt)}
.bc-exc{font-size:13px;color:var(--mut);line-height:1.65;flex:1}
.bc-meta{font-size:12px;color:var(--mut);margin-top:14px;display:flex;align-items:center;gap:8px}

/* ── DESTINATION TILES ── */
.dt{border-radius:var(--r-lg);overflow:hidden;position:relative;cursor:pointer}
.dt img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease);display:block}
.dt:hover img{transform:scale(1.07)}
.dt-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.76) 0%,transparent 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:20px}
.dt-n{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#fff}
.dt-c{font-size:11px;color:rgba(255,255,255,.55);margin-top:3px;letter-spacing:.05em}

/* ── MAIN CONTENT OFFSET ── */
main#app{padding-top:72px}
/* Hero and auth are full-bleed — pull back the offset */
.hero,.auth-page{margin-top:-72px}
/* pg-hdr already has generous padding-top; keep it but trim slightly */
.pg-hdr{padding:56px 5% 56px;position:relative;overflow:hidden}
.pg-hdr::before{content:attr(data-bg);position:absolute;top:-30px;left:-10px;font-family:'Bebas Neue',cursive;font-size:160px;color:rgba(255,255,255,.025);letter-spacing:.06em;white-space:nowrap;pointer-events:none;z-index:0;line-height:1}
.pg-hdr::before{content:attr(data-bg);position:absolute;top:-30px;left:-10px;font-family:'Bebas Neue',cursive;font-size:160px;color:rgba(255,255,255,.025);letter-spacing:.06em;white-space:nowrap;pointer-events:none;z-index:0;line-height:1}
.pg-hdr-dk{background:linear-gradient(140deg,var(--dk) 0%,#141414 100%)}
.pg-hdr>*{position:relative;z-index:1}
.cta-sec{background:var(--red);padding:96px 5%;text-align:center;position:relative;overflow:hidden}
.cta-sec::before{content:'';position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1489516408517-0c0a15662682?w=1400&q=40') center/cover;opacity:.1}
.cta-sec>*{position:relative;z-index:1}

/* ── DETAIL PAGE ── */
.d-hero{position:relative;height:56vh;min-height:360px;overflow:hidden}
.d-hero img{width:100%;height:100%;object-fit:cover}
.d-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,.35) 0%,rgba(0,0,0,.1) 100%)}
.d-hc{position:absolute;bottom:24px;left:5%;right:5%;z-index:2}
.d-bc{font-size:13px;color:rgba(255,255,255,.52);margin-bottom:10px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:color .2s;padding:6px 12px;background:rgba(255,255,255,.08);border-radius:100px;backdrop-filter:blur(8px)}
.d-bc:hover{color:#fff}
.d-body{display:grid;grid-template-columns:1fr 360px;gap:40px;padding:44px 5%;max-width:1240px;margin:0 auto}

/* ── BOOKING SIDEBAR ── */
.bk-sb{background:#fff;border-radius:var(--r-xl);padding:26px;box-shadow:var(--sh2);position:sticky;top:90px;border:1px solid var(--bdr)}
.qi{display:flex;flex-direction:column;gap:9px;padding:14px;background:var(--cream);border-radius:12px;margin:15px 0}
.qi-r{display:flex;justify-content:space-between;font-size:13px}
.qi-r span:first-child{color:var(--mut)}
.qi-r span:last-child{font-weight:700;color:var(--txt)}
.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:20px}
.gallery img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--r-sm);cursor:pointer;transition:transform .3s,opacity .2s}
.gallery img:hover{transform:scale(1.04);opacity:.9}
/* ── DETAIL IMAGE SLIDER ─────────────────── */
.d-sl-track{display:flex;height:100%;transition:transform .4s cubic-bezier(.4,0,.2,1);will-change:transform}
.d-sl-slide{flex:none;height:100%;overflow:hidden}
.d-sl-slide img{width:100%;height:100%;object-fit:cover;display:block}
.d-sl-dots{position:absolute;bottom:76px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:10}
.d-sl-dot{width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,.4);cursor:pointer;transition:all .25s}
.d-sl-dot.act{background:#fff;width:18px}
.hl-item{display:flex;align-items:flex-start;gap:9px;font-size:14px;color:var(--txt2);line-height:1.6}
.hl-item::before{content:'✓';width:22px;height:22px;background:var(--sage-l);color:var(--sage);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.it-day{border:1px solid var(--bdr);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;transition:border-color .2s}
.it-day:hover{border-color:rgba(184,23,46,.2)}
.day-badge{background:var(--red);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:14px;flex-shrink:0}

/* ── BOOKING MODAL ── */
/* ── ITINERARY POPUP ────────────────── */
.it-mo{position:fixed;inset:0;z-index:960;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .25s}
.it-mo.open{opacity:1;pointer-events:all}
.it-mc{background:#fff;border-radius:26px 26px 0 0;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;padding:0;transform:translateY(32px);transition:transform .32s cubic-bezier(.4,0,.2,1);box-shadow:0 -8px 40px rgba(0,0,0,.18)}
.it-mo.open .it-mc{transform:translateY(0)}
.it-pill{width:40px;height:4px;border-radius:2px;background:var(--bdr);margin:0 auto;cursor:pointer;position:sticky;top:10px;z-index:5}
.it-modal-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;position:sticky;top:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);z-index:4;border-bottom:1px solid var(--bdr)}
.it-day-block{position:relative;margin-bottom:0}
.it-day-photo{width:100%;height:200px;object-fit:cover;display:block}
.it-day-photo-wrap{position:relative;overflow:hidden}
.it-day-photo-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0) 50%,rgba(0,0,0,.45) 100%)}
.it-day-badge{position:absolute;bottom:14px;left:18px;z-index:2;display:flex;align-items:center;gap:8px}
.it-day-num{width:42px;height:42px;background:var(--red);border:2.5px solid rgba(255,255,255,.9);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:14px;color:#fff;flex-shrink:0;box-shadow:0 3px 10px rgba(0,0,0,.3)}
.it-day-num span{font-size:8px;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.7);font-family:inherit;line-height:1}
.it-day-title-overlay{font-size:16px;font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.5);line-height:1.25}
.it-day-body{padding:16px 20px 20px;border-bottom:1px solid var(--bdr)}
.it-day-block:last-child .it-day-body{border-bottom:none;padding-bottom:40px}
.it-timeline-line{position:absolute;left:38px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--red),rgba(184,23,46,.08));pointer-events:none}
.it-day-block:last-child .it-timeline-line{display:none}
.it-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.it-step-dot{width:8px;height:8px;background:var(--red);border-radius:50%;flex-shrink:0;margin-top:6px;opacity:.7}
.it-step-txt{font-size:13px;color:var(--mut);line-height:1.65}
.it-day-card{position:relative;padding:14px 16px 14px 64px;margin-bottom:0;cursor:pointer;transition:background .2s;border-radius:14px}
.it-day-card:hover{background:rgba(184,23,46,.04)}
.it-day-card .it-num{position:absolute;left:0;top:14px;width:40px;height:40px;background:var(--blk);border:2px solid var(--red);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:13px;color:#fff;flex-shrink:0;z-index:1}
.it-day-card .it-num span{font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.55);line-height:1;font-family:inherit}
.it-timeline{position:relative;padding-left:0}
.it-timeline::before{content:'';position:absolute;left:19px;top:54px;bottom:20px;width:2px;background:linear-gradient(to bottom,var(--red),rgba(184,23,46,.1));border-radius:2px}
/* ── QUICK INFO STRIP ── */
.qi-strip{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;background:#fff;border:1px solid var(--bdr);border-radius:16px;margin:16px 0 0;padding:0;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.qi-strip::-webkit-scrollbar{display:none}
.qi-stat{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 16px;min-width:88px;flex:1;text-align:center;border-right:1px solid var(--bdr);gap:4px;flex-shrink:0}
.qi-stat:last-child{border-right:none}
.qi-stat-icon{font-size:20px;line-height:1}
.qi-stat-val{font-size:12px;font-weight:700;color:var(--txt);line-height:1.3}
.qi-stat-lbl{font-size:9px;color:var(--mut);letter-spacing:.06em;text-transform:uppercase}
/* ── PACKING LIST ── */
.pack-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px 20px;margin-top:12px}
.pack-i{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--txt);padding:2px 0}
.pack-i::before{content:'';width:16px;height:16px;min-width:16px;border:1.5px solid var(--bdr);border-radius:4px;flex-shrink:0}
/* ── FAQ ACCORDION ── */
.faq-wrap{display:flex;flex-direction:column}
.faq-item{border-bottom:1px solid var(--bdr)}
.faq-item:first-child{border-top:1px solid var(--bdr)}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:13px 0;cursor:pointer;font-size:14px;font-weight:600;color:var(--txt);gap:12px;-webkit-user-select:none;user-select:none}
.faq-q svg{flex-shrink:0;transition:transform .25s;color:var(--mut)}
.faq-item.open .faq-q svg{transform:rotate(180deg)}
.faq-item.open .faq-q{color:var(--red)}
.faq-a{font-size:13px;color:var(--mut);line-height:1.75;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease}
.faq-item.open .faq-a{max-height:220px;padding-bottom:14px}
/* ── BOOKING SIDEBAR ENHANCEMENTS ── */
.bk-deposit{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:10px;padding:10px 13px;margin-bottom:12px;font-size:12px;color:var(--txt);display:flex;align-items:center;gap:8px;font-weight:600}
.bk-trust{display:flex;justify-content:space-around;padding:12px 0 2px;border-top:1px solid var(--bdr);margin-top:10px;gap:4px}
.bk-trust-i{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;color:var(--mut);text-align:center;flex:1;letter-spacing:.03em;font-weight:600;text-transform:uppercase}
.bk-trust-i .ico{font-size:18px;line-height:1}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:950;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.mb{background:#fff;width:100%;max-width:640px;border-radius:24px 24px 0 0;max-height:96vh;overflow-y:auto;position:relative;box-shadow:var(--sh3)}
@media(min-width:700px){.mo{align-items:center}.mb{border-radius:24px;max-height:90vh}}
.mb-close{position:absolute;top:16px;right:16px;width:34px;height:34px;background:var(--cream);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--mut);cursor:pointer;z-index:5;transition:all .2s;border:1px solid var(--bdr)}
.mb-close:hover{background:var(--bdr);color:var(--txt)}
.mh{padding:26px 28px 0}
.mm{padding:0 28px 28px}
.mf{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-top:1px solid var(--bdr);background:#fff;position:sticky;bottom:0;border-radius:0 0 24px 24px;gap:10px}
.sp{display:flex;align-items:center}
.sd{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .3s}
.sd-d{background:var(--red);color:#fff;box-shadow:0 0 0 4px rgba(184,23,46,.15)}.sd-a{background:var(--red);color:#fff}.sd-p{background:var(--cream);color:var(--mut);border:1.5px solid var(--bdr)}
.sl{flex:1;height:2px;background:var(--bdr);transition:background .3s;margin:0 4px}.sl-d{background:var(--red)}
.fg{margin-bottom:16px}
.fl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);display:block;margin-bottom:6px}
.fi{width:100%;padding:11px 14px;border:1.5px solid var(--bdr);border-radius:12px;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;background:#fff;color:var(--txt)}
.fi:focus{border-color:var(--red);box-shadow:0 0 0 4px rgba(184,23,46,.08)}
.fi-area{resize:vertical;min-height:80px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cc{display:flex;align-items:center;border:1.5px solid var(--bdr);border-radius:12px;overflow:hidden;height:46px;transition:border-color .2s}
.cc:focus-within{border-color:var(--red)}
.cb{width:42px;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--mut);cursor:pointer;transition:background .15s}
.cb:hover{background:var(--cream);color:var(--txt)}
.cv{flex:1;text-align:center;font-size:16px;font-weight:700;color:var(--txt)}
.pb{background:var(--cream);border-radius:12px;padding:14px 16px;margin:15px 0;border:1px solid var(--bdr)}
.pr{display:flex;justify-content:space-between;font-size:14px;padding:4px 0}
.pt{border-top:1px solid var(--bdr);margin-top:7px;padding-top:11px;font-weight:700;font-size:15px}
.pt span:last-child{color:var(--red);font-size:19px}
.ao{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bdr)}
.ao:last-child{border-bottom:none}
.at{width:40px;height:22px;background:var(--bdr);border-radius:100px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.at.on{background:var(--red)}
.at::after{content:'';width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.at.on::after{transform:translateX(18px)}
.mini-exp{display:flex;align-items:center;gap:12px;padding:12px;background:var(--cream);border-radius:12px;margin-bottom:18px;border:1px solid var(--bdr)}
.mini-exp img{width:56px;height:44px;object-fit:cover;border-radius:8px;flex-shrink:0}
.mini-exp h4{font-size:13px;font-weight:700;line-height:1.3;color:var(--txt)}
.mini-exp p{font-size:12px;color:var(--mut);margin-top:2px}
.conf-icon{width:68px;height:68px;background:linear-gradient(135deg,#22C55E,#16A34A);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:30px;box-shadow:0 8px 32px rgba(34,197,94,.3)}
.conf-ref{font-family:'Bebas Neue',cursive;font-size:34px;color:var(--red);letter-spacing:.1em;margin:8px 0}
.conf-tbl{width:100%;border-collapse:collapse;font-size:13px;margin:16px 0}
.conf-tbl td{padding:8px 0;border-bottom:1px solid var(--bdr)}
.conf-tbl td:first-child{color:var(--mut);width:44%}
.conf-tbl td:last-child{font-weight:700}
.fi-check{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;color:var(--txt)}

/* ── AUTH ── */
.auth-page{display:grid;grid-template-columns:1fr 1fr;min-height:100vh}
.auth-left{position:relative;overflow:hidden;background:var(--blk)}
.auth-slides{position:absolute;inset:0}
.auth-slide{position:absolute;inset:0;opacity:0;background-size:cover;background-position:center;transition:opacity 1.4s ease,transform 9s ease;transform:scale(1.06)}
.auth-slide.on{opacity:1;transform:scale(1)}
.auth-left-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(8,8,8,.28) 0%,rgba(184,23,46,.12) 45%,rgba(8,8,8,.88) 100%);z-index:1}
.auth-particles{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.auth-particle{position:absolute;border-radius:50%;animation:float linear infinite;opacity:0}
@keyframes float{0%{opacity:0;transform:translateY(0)}10%{opacity:.7}80%{opacity:.25}100%{opacity:0;transform:translateY(-100px) rotate(360deg)}}
.auth-left-content{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;justify-content:space-between;padding:36px 40px}
.auth-quote-wrap{flex:1;display:flex;align-items:center;padding:20px 0}
.auth-quotes{position:relative;width:100%;min-height:140px}
.auth-quote{position:absolute;top:0;left:0;right:0;opacity:0;transition:opacity .9s ease}
.auth-quote.on{opacity:1}
.auth-quote-text{font-family:'Cormorant Garamond',serif;font-size:clamp(18px,2vw,27px);font-weight:600;color:#fff;line-height:1.35;margin-bottom:12px}
.auth-quote-src{font-size:12px;color:rgba(255,255,255,.45);letter-spacing:.05em}
.auth-dest-pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.auth-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:100px;padding:6px 13px;font-size:11px;color:rgba(255,255,255,.78);font-weight:500;transition:all .25s;cursor:pointer;backdrop-filter:blur(6px)}
.auth-pill:hover{background:rgba(184,23,46,.3);border-color:rgba(184,23,46,.5);color:#fff}
.auth-mountain-svg{position:absolute;bottom:0;left:0;right:0;z-index:2;pointer-events:none}
.auth-progress{display:flex;gap:6px}
.auth-prog-dot{width:24px;height:3px;border-radius:2px;background:rgba(255,255,255,.22);cursor:pointer;transition:all .35s}

.auth-right{background:#fff;display:flex;flex-direction:column;overflow-y:auto}

.pw-w{position:relative}

/* ── DASHBOARD ── */

/* ── BOOKING CARDS ── */

/* ── TOAST ── */

#toast.show{transform:translateY(0);opacity:1}

/* ── WHATSAPP FAB ── */
.wa{position:fixed;bottom:24px;right:24px;width:52px;height:52px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:400;box-shadow:0 4px 16px rgba(37,211,102,.45);animation:wap 2.8s infinite;transition:transform .25s}

@keyframes wap{0%,100%{box-shadow:0 4px 16px rgba(37,211,102,.45)}50%{box-shadow:0 4px 28px rgba(37,211,102,.7),0 0 0 8px rgba(37,211,102,.08)}}

/* ── PLAN STEP OPTS ── */

.tb-step{animation:fadeIn .25s ease}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── REVEAL ── */
.reveal{opacity:0;transform:translateY(18px);transition:opacity .55s ease,transform .55s ease}
.revealed{opacity:1;transform:none}

/* ── FOOTER ── */

/* ═══════════════════════════════════════════════
   NATIVE MOBILE APP SHELL + PREMIUM DESIGN
   modern · glass · neo · Roamers brand (≤900px)
═══════════════════════════════════════════════ */
:root{
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --tab-h: 78px;
  --topbar-h: 62px;
}
.app-topbar,.app-tabs{display:none}
.d-floating-book{display:none}

/* Prevent horizontal scroll & images overflowing */
html,body{max-width:100vw;overflow-x:hidden}
img,video{max-width:100%;height:auto}

/* ── Experience & Activity slider rows (desktop base) ── */
.exp-slider-row{
  display:flex;gap:22px;overflow-x:auto;
  padding:8px 5% 24px;
  scroll-snap-type:x mandatory;
  scrollbar-width:none;
}
.exp-slider-row::-webkit-scrollbar{display:none}
.exp-slide-card{
  flex:0 0 300px;max-width:300px;scroll-snap-align:start;
}

@media(max-width:900px){
  /* Disable tap highlight + double-tap zoom */
  *{ -webkit-tap-highlight-color: transparent }
  button,a{ touch-action: manipulation }
  body{ -webkit-user-select:none; user-select:none; -webkit-touch-callout:none }
  input,textarea,select,[contenteditable]{ -webkit-user-select:text; user-select:text }

  /* Brand-tinted ambient background */
  body{
    background:
      radial-gradient(circle at 0% -8%, rgba(184,23,46,.07) 0%, transparent 42%),
      radial-gradient(circle at 100% 18%, rgba(217,184,122,.10) 0%, transparent 50%),
      radial-gradient(circle at 50% 105%, rgba(61,107,53,.05) 0%, transparent 38%),
      var(--warm)
  }

  /* Hide desktop nav */
  #nav{display:none !important}

  /* TOP APP BAR */
  .app-topbar{
    display:flex;align-items:center;justify-content:space-between;
    position:fixed;top:0;left:0;right:0;z-index:500;
    height:calc(var(--topbar-h) + var(--safe-top));
    padding:var(--safe-top) 14px 0;
    background:rgba(250,247,242,.78);
    backdrop-filter:saturate(180%) blur(24px);
    -webkit-backdrop-filter:saturate(180%) blur(24px);
    border-bottom:1px solid rgba(184,23,46,.08);
    box-shadow:0 1px 0 rgba(255,255,255,.6) inset, 0 4px 18px rgba(0,0,0,.04)
  }
  .app-topbar.dark{
    background:linear-gradient(180deg, rgba(8,8,8,.85) 0%, rgba(8,8,8,.65) 100%);
    color:#fff;border-bottom-color:rgba(217,184,122,.18)
  }
  .app-topbar .ab-l,.app-topbar .ab-r{display:flex;align-items:center;gap:6px;min-width:46px}
  .app-topbar .ab-r{justify-content:flex-end}
  .app-topbar .ab-title{
    font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;
    color:inherit;text-align:center;flex:1;min-width:0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.012em;
    display:inline-flex;align-items:center;gap:6px;justify-content:center
  }
  .app-topbar:not(.dark) .ab-title::before{
    content:'';width:6px;height:6px;border-radius:50%;
    background:linear-gradient(135deg, var(--red), var(--sand));
    box-shadow:0 0 8px rgba(184,23,46,.5);
    flex-shrink:0
  }
  .app-topbar.dark .ab-title::before{
    content:'';width:6px;height:6px;border-radius:50%;
    background:var(--sand);box-shadow:0 0 10px rgba(217,184,122,.7);
    flex-shrink:0
  }
  .app-btn{
    width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:rgba(184,23,46,.06);color:inherit;font-size:18px;border:none;cursor:pointer;
    transition:transform .12s,background .15s
  }
  .app-btn:active{transform:scale(.92);background:rgba(184,23,46,.14)}
  .app-topbar.dark .app-btn{background:rgba(255,255,255,.08);color:#fff}
  .app-topbar.dark .app-btn:active{background:rgba(255,255,255,.18)}

  /* MAIN content offsets to clear bars */
  main#app{
    padding-top: calc(var(--topbar-h) + var(--safe-top));
    padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 8px);
    min-height:100vh;
    animation:pageIn .25s ease-out both
  }
  @keyframes pageIn{from{opacity:.4}to{opacity:1}}
  body.is-login main#app{padding-top:0;padding-bottom:0}

  /* Hero takes the screen but not way more */
  .hero{
    height:100vh !important;min-height:520px !important;
  }
  .hero-c{padding:0 !important;top:calc(var(--topbar-h) + var(--safe-top) + 40px) !important;bottom:calc(var(--tab-h) + var(--safe-bottom) + 8px) !important;left:4% !important;right:4% !important}
  .hero h1.h1{font-size:clamp(36px,11vw,52px) !important;line-height:1.02}
  .hero-bg{position:absolute !important;inset:0;transform:none !important;animation:none !important}
  .pg-hdr{padding:24px 18px 24px}

  /* BOTTOM TAB BAR */
  .app-tabs{
    display:flex;justify-content:space-around;align-items:stretch;
    position:fixed;bottom:0;left:0;right:0;z-index:550;
    height:calc(var(--tab-h) + var(--safe-bottom));
    padding-bottom:var(--safe-bottom);
    background:rgba(10,8,8,.35);
    backdrop-filter:saturate(160%) blur(22px);
    -webkit-backdrop-filter:saturate(160%) blur(22px);
    border-top:1px solid rgba(255,255,255,.12);
    box-shadow:0 -8px 32px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.08)
  }
  .app-tab{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;padding:8px 4px 6px;background:none;border:none;cursor:pointer;
    color:var(--mut);transition:color .15s,transform .15s;font-family:inherit;
    position:relative
  }
  .app-tab:active{transform:scale(.92)}
  .app-tab .ti{font-size:21px;line-height:1;transition:transform .2s, filter .2s}
  .app-tab .tl{font-size:10px;font-weight:600;letter-spacing:.02em}
  .app-tab.on{color:var(--red)}
  .app-tab.on .ti{
    transform:translateY(-1px) scale(1.06);
    filter:saturate(1.2) drop-shadow(0 2px 6px rgba(184,23,46,.35))
  }
  .app-tab.on .tl{
    background:linear-gradient(135deg, var(--red), var(--red-d));
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;font-weight:800
  }
  .app-tab.on::before{
    content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:34px;height:3px;border-radius:0 0 100px 100px;
    background:linear-gradient(to right, var(--sand), var(--red), var(--sand));
    box-shadow:0 0 14px rgba(184,23,46,.5), 0 0 6px rgba(217,184,122,.4)
  }

  /* Hide WhatsApp floating btn (replaced by top-bar/menu) */
  .wa{display:none !important}

  /* Tighter section padding */
  .sec{padding:36px 18px}

  /* GLASS CARDS — auto upgrade for white cards */
  [style*="background:#fff"][style*="border-radius"]:not(.bk-sb):not(.app-tab):not(.app-btn):not(.exp-search):not(.act-search){

/* ═══════════════════════════════════════
   VISUAL LIFE ENHANCEMENTS
═══════════════════════════════════════ */

/* Grain texture overlay on every page */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;
  opacity:.032;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}

/* Shimmer on gold italic text */
em.s{
  background:linear-gradient(90deg,#D9B87A 0%,#F5E6BE 40%,#D9B87A 60%,#C09A52 100%);
  background-size:300% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  animation:shimmerGold 4s ease-in-out infinite;
}
@keyframes shimmerGold{
  0%{background-position:100% 50%}
  50%{background-position:0% 50%}
  100%{background-position:100% 50%}
}

/* Hero overlay pulse */
@keyframes heroPulse{
  0%,100%{opacity:.62}50%{opacity:.72}
}
.hero-bg{animation:khz 11s ease forwards,heroPulse 7s ease-in-out infinite!important}

/* Blink dot already uses blink — make it red glow too */
.hero-tag::before{box-shadow:0 0 6px rgba(184,23,46,.8)}

/* Floating orb */
@keyframes floatOrb{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(15px,-20px) scale(1.04)}
  66%{transform:translate(-10px,10px) scale(.97)}
}
.orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;animation:floatOrb 10s ease-in-out infinite}

/* Marquee */
@keyframes marqueeScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.marquee-track{overflow:hidden;flex:1}
.marquee-inner{display:flex;width:max-content;gap:40px;animation:marqueeScroll 28s linear infinite}
.marquee-inner:hover{animation-play-state:paused}

/* Segment card glow on hover */
.seg-card{transition:transform .35s cubic-bezier(.25,.1,.25,1),box-shadow .35s ease!important}
.seg-card-r:hover{box-shadow:0 24px 60px rgba(184,23,46,.5)!important}
.seg-card-p:hover{box-shadow:0 24px 60px rgba(124,58,237,.5)!important}
.seg-card-g:hover{box-shadow:0 24px 60px rgba(22,163,74,.5)!important}
.seg-card-b:hover{box-shadow:0 24px 60px rgba(37,99,235,.5)!important}
.seg-card-a:hover{box-shadow:0 24px 60px rgba(217,119,6,.5)!important}

/* Experience cards — bolder hover */
.ec:hover{transform:translateY(-10px) scale(1.015)!important;box-shadow:0 28px 64px rgba(0,0,0,.2)!important}
.ec:hover .ec-img img{transform:scale(1.1)!important}

/* Why Roamers cards — glowing icon accent */
.wc-dk:hover{border-color:rgba(217,184,122,.35)!important;box-shadow:0 12px 40px rgba(0,0,0,.35),0 0 0 1px rgba(217,184,122,.18)!important}

/* Stat cards glow */
.sc{position:relative;overflow:hidden;transition:transform .3s,box-shadow .3s}
.sc::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(217,184,122,.12),transparent 70%);opacity:0;transition:opacity .4s}
.sc:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.3)}
.sc:hover::before{opacity:1}
.sc-n{text-shadow:0 0 40px rgba(217,184,122,.4)}

/* Testimonial cards — stronger reveal */
.tc{transition:transform .3s,box-shadow .3s}
.tc:hover{transform:translateY(-5px);box-shadow:0 20px 56px rgba(0,0,0,.1)}
.tc::before{content:'"';position:absolute;top:-10px;left:16px;font-family:'Cormorant Garamond',serif;font-size:120px;color:rgba(184,23,46,.06);line-height:1;pointer-events:none;z-index:0}
.tc{position:relative}
.tc>*{position:relative;z-index:1}

/* Blog cards */
.bc:hover{transform:translateY(-6px)!important;box-shadow:0 24px 56px rgba(0,0,0,.13)!important}

/* CTA section enhanced */
.cta-sec{
  background:linear-gradient(135deg,var(--red-d) 0%,var(--red) 50%,#c91b33 100%)!important;
  position:relative;overflow:hidden;
}
.cta-sec::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 120%,rgba(255,255,255,.07),transparent);
  pointer-events:none;z-index:0;
}
.cta-sec>*{position:relative;z-index:1}

/* Section eye eyebrow glow */
.eye{position:relative}

/* Reveal — more dramatic */
.reveal{opacity:0;transform:translateY(32px) scale(.99);transition:opacity .65s ease,transform .65s cubic-bezier(.25,.46,.45,.94)}
.revealed{opacity:1;transform:none}
.reveal:nth-child(2){transition-delay:.1s}
.reveal:nth-child(3){transition-delay:.2s}
.reveal:nth-child(4){transition-delay:.3s}

/* Counter number animation */
@keyframes countUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.stat-animated{animation:countUp .6s ease forwards}

/* Image tiles hover glow */
.dt:hover{box-shadow:0 16px 48px rgba(0,0,0,.4)}
.dt{transition:box-shadow .3s,transform .3s}
.dt:hover{transform:scale(1.015)}

/* Nav enhanced glass */
#nav.solid{background:rgba(4,4,4,.94)!important;backdrop-filter:blur(24px) saturate(200%)!important}

/* Button shine sweep */
.btn-r::before{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
  transition:left .5s ease;
}
.btn-r:hover::before{left:150%}

/* Scroll progress bar */
#scrollProgress{
  position:fixed;top:0;left:0;height:2px;width:0%;
  background:linear-gradient(90deg,var(--red),var(--sand));
  z-index:1000;transition:width .1s linear;
}

/* ── APP DOWNLOAD SECTION ── */
.app-dl-section{
  background:linear-gradient(155deg,#070f1c 0%,#0d1b2e 45%,#0a1620 100%);
  padding:100px 0;
  position:relative;
  overflow:hidden;
}
.app-dl-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:72px;
  align-items:center;
}
.app-dl-features{display:flex;flex-direction:column;gap:13px;margin-bottom:36px}
.app-dl-cta{display:flex;flex-direction:column;align-items:flex-start}
.app-dl-btn{
  display:inline-flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  color:#0f172a;padding:16px 32px;border-radius:14px;
  font-weight:800;font-size:1rem;text-decoration:none;
  box-shadow:0 8px 32px rgba(251,191,36,.3),0 2px 8px rgba(0,0,0,.3);
  transition:transform .2s,box-shadow .2s;
}
.app-dl-btn:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(251,191,36,.4),0 4px 12px rgba(0,0,0,.4)}
.app-dl-phone{display:flex;justify-content:center;align-items:center}
@media(max-width:900px){
  .app-dl-section{padding:72px 0}
  .app-dl-grid{grid-template-columns:1fr;gap:52px;text-align:center}
  .app-dl-grid .app-dl-phone{order:-1}
  .app-dl-cta{align-items:center}
  .app-dl-features li{justify-content:center}
}
@media(max-width:480px){
  .app-dl-section{padding:56px 0}
  .app-dl-btn{padding:14px 24px;font-size:.95rem;width:100%;justify-content:center}
  .app-dl-cta{align-items:stretch}
}

var POSTS = [
  {id:'sahara-stars',cat:'Adventure',title:'What sleeping under the Sahara stars is really like',exc:'Beyond the Instagram photo — what actually happens when night falls in Erg Chebbi, and why it permanently changes people.',img:'https://images.unsplash.com/photo-1549144511-f099e773c147?w=700&q=80',read:'5 min',date:'April 12, 2024',author:'Youssef Roamer',avatar:'https://images.unsplash.com/photo-1560250097-0b93528c311a?w=80&q=70',body:'<p>You have seen the photos. Perfectly framed dunes, a lone silhouette on a camelback, a sky absolutely choked with stars. You have thought to yourself: that is probably edited. It is not. It is more beautiful.</p><h3>What actually happens when night falls in Erg Chebbi</h3><p>By 6pm, the temperature drops with startling speed. The dunes that were scorching at noon become pleasantly warm underfoot. The light turns gold, then amber, then a deep crimson that makes everything look like a painting.</p><blockquote>I have photographed 43 countries. I have never deleted fewer photos from a single night than in the Sahara. Everything was usable. — Sophie M., travel photographer, Lyon</blockquote><p>The Berber camp is set up deep in the dunes — far enough from Merzouga that you cannot see a single artificial light. The tents are luxury nomadic: real beds, proper blankets, a small solar lamp. But the ceiling is the stars.</p><h3>The silence nobody talks about</h3><p>At 2am, when your camp is asleep and you step outside, the silence is so complete it has a physical quality. The Milky Way stretches from horizon to horizon in a solid white band you have never seen outside of a telescope image. People cry. Not because they are sad. Because it is overwhelming.</p>'},
  {id:'fes-secrets',cat:'Culture',title:'7 things no guidebook tells you about Fes medina',exc:'Our local guides share their neighbourhood secrets — from the best mint tea to the tannery shortcuts tourists never find.',img:'https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=700&q=80',read:'7 min',date:'March 8, 2024',author:'Fatima Roamer',avatar:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=80&q=70',body:'<p>The Fes medina has 9,400 alleys. The world largest car-free urban area is also one of the most labyrinthine and magnificent places on the planet. Most tourists see about 12 of those alleys.</p><h3>1. The real entrance to Chouara tannery is NOT the famous one</h3><p>Every tour group enters from the leather shop balconies on Derb Chouara. Walk around to the Andalusian quarter side — there is a small guesthouse that lets you onto their rooftop for 20 dirhams. You will have it almost to yourself.</p><h3>2. Al Qarawiyyin is open to non-Muslims</h3><p>Founded in 859 AD, Al Qarawiyyin is officially the world oldest continuously operating university. The magnificent entrance courtyard is accessible. Stand there and absorb 1,165 years of learning.</p><blockquote>Getting lost is not a problem in Fes. It is the whole point. — Hamid, Roamers guide for 9 years</blockquote><h3>3. The best mint tea is NOT in a tourist cafe</h3><p>There is a tiny cafe at the corner of Talaa Kbira and Derb Idrissi — no sign, three tables, a man who has been making tea in the same spot for 40 years. Three dirhams. The best mint tea in the world.</p>'},
  {id:'team-nature',cat:'Team Building',title:'Why Moroccan mountains are the future of corporate retreats',exc:'We surveyed 80 HR managers. Here is why natural environments outperform hotel ballrooms every time.',img:'https://images.unsplash.com/photo-1528605248644-14dd04022da1?w=700&q=80',read:'6 min',date:'February 14, 2024',author:'Karim Roamer',avatar:'https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=80&q=70',body:'<p>In 2023, we surveyed 80 HR managers who had organized corporate retreats. We asked: what type of program generated the most measurable improvement in team cohesion and morale?</p><p>Hotel ballroom conference: 23% rated it highly effective. Mountain or desert retreat: 84%.</p><h3>Why nature works</h3><p>Studies from the University of Michigan and Stanford consistently show that exposure to natural environments reduces cortisol, improves attention span, and increases prosocial behaviour. People are kinder, more collaborative, and more creative in nature.</p><blockquote>Our team dynamics changed after three days in the Atlas. Not because of the workshops alone — because we ate together, got lost together, and helped each other across a river. You cannot manufacture that in a conference room. — Lamia Tazi, HR Director, Casablanca</blockquote><h3>The Moroccan advantage</h3><p>Morocco Atlas Mountains offer dramatic, accessible, jaw-dropping natural environment within 90 minutes of Casablanca or Marrakech. You do not need long-haul flights. You need the willingness to step outside your comfort zone for 48 hours.</p>'},
  {id:'packing',cat:'Travel Tips',title:'The definitive Morocco packing guide (by people who live here)',exc:'What to actually bring, what to leave at home, and what to buy when you arrive.',img:'https://images.unsplash.com/photo-1570168007204-dfb528c6958f?w=700&q=80',read:'4 min',date:'January 15, 2024',author:'Aisha Roamer',avatar:'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=80&q=70',body:'<p>After 7 years of guiding thousands of travelers through Morocco, we have seen every possible packing mistake. The over-packers with suitcases that will not fit a riad corridor. The under-packers shivering in the Atlas in July.</p><h3>Essentials you cannot skip</h3><p>A light but warm layer — even in summer. The Atlas Mountains and the desert get genuinely cold at night. A scarf (sun protection, dust mask, blanket, and souvenir all in one). Comfortable walking shoes with ankle support. Cash in dirhams — many medina shops do not accept cards.</p><blockquote>The best thing you can bring to Morocco is an open mind. The second best is a good pair of shoes. — Mohamed, Roamers head guide</blockquote><h3>What to buy here instead</h3><p>Buy your argan oil here — it is better and cheaper than anywhere else. Buy a djellaba — they are incredibly practical travel clothes. Buy spices from a reputable shop with fixed prices.</p>'},
  {id:'toubkal',cat:'Adventure',title:'Complete guide to climbing Toubkal — everything you need to know',exc:'North Africa highest peak is achievable for any fit adult. Here is how to do it safely.',img:'https://images.unsplash.com/photo-1542621334-a254cf47733d?w=700&q=80',read:'9 min',date:'December 20, 2023',author:'Hassan Roamer',avatar:'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=80&q=70',body:'<p>Jebel Toubkal. 4,167 metres. The highest point in Morocco, and the highest peak in the entire Atlas range. It is also one of the most accessible high-altitude treks in the world for non-technical climbers.</p><h3>Is it doable without mountaineering experience?</h3><p>Yes. Toubkal is a demanding hike, but not a technical climb. You will not need ropes, crampons, or ice axes except in winter. What you need is: reasonable cardiovascular fitness, good-quality hiking boots, and a guide who knows the mountain.</p><blockquote>Standing on the summit at sunrise, looking out over a sea of clouds with the Sahara visible to the south — that is a moment I replay in my head regularly. — Thomas, Roamers client, London</blockquote><h3>Best time to climb</h3><p>April through June and September through November are ideal — the weather is stable, the views are clear, and the mountain is neither too hot nor snow-covered. December through March requires winter equipment and more experience.</p>'},
  {id:'china-morocco',cat:'International',title:'Why China is falling in love with Morocco',exc:'Record numbers of Chinese tourists are discovering Morocco. We explain why.',img:'https://images.unsplash.com/photo-1572073263888-da4af9af2bf5?w=700&q=80',read:'8 min',date:'January 30, 2024',author:'Wei Roamer',avatar:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=80&q=70',body:'<p>2023 was a record year for Chinese arrivals in Morocco, with visitor numbers growing 340% compared to 2019. By 2025, industry analysts predict Morocco will be among the top 5 African destinations for Chinese outbound tourism.</p><h3>The exotic and the accessible</h3><p>For Chinese travelers, Morocco represents an almost mythical combination. The Sahara. The ancient medinas. The Atlantic coast. It feels genuinely foreign — unlike European city-breaks — yet has modern infrastructure and visa-free entry for Chinese citizens since 2016.</p><blockquote>Morocco has everything we want from a long-haul trip: dramatic landscapes, ancient history, incredible food, and genuine cultural difference. — Liu Jing, Shanghai tour operator</blockquote><h3>How Roamers facilitates Chinese groups</h3><p>We are Morocco specialist in Chinese visitor programs. Our Mandarin-speaking guides, partnerships with Beijing and Shanghai operators, and culturally calibrated itineraries have made us the go-to partner for groups of 10 to 200.</p>'}

/* History stack for native back-button behavior */
var APP_HISTORY = [];

/* ROUTER */
function go(pg,param){
  if(ST.pg && ST.pg !== pg) APP_HISTORY.push({pg:ST.pg, param:ST.param});
  if(APP_HISTORY.length > 30) APP_HISTORY.shift();

  ST.pg=pg; ST.param=param||null;
  if(window._authTimer){clearInterval(window._authTimer);window._authTimer=null;}
  var nav=document.getElementById('nav');
  var mob=document.getElementById('mob');
  var wa=document.querySelector('.wa');
  if(nav)  nav.style.display  = pg==='login' ? 'none' : '';
  if(mob)  mob.style.display  = pg==='login' ? 'none' : '';
  if(wa)   wa.style.display   = pg==='login' ? 'none' : '';
  if(nav) nav.classList.toggle('solid', pg!=='home');
  document.getElementById('app').innerHTML = render();
  window.scrollTo({top:0,behavior:'smooth'});
  syncNav();
  syncAppShell(pg);
  setTimeout(function(){initReveal();initDetailSlider();if(pg==='home')initHeroCanvas();},80);
  /* Close mobile drawer if open */
  var mob2=document.getElementById('mob');
  if(mob2 && mob2.classList.contains('open')){mob2.classList.remove('open');document.body.style.overflow='';}
}

function render(){
  if(ST.pg==='home')         return pgHome();
  if(ST.pg==='experiences')  return pgExp();
  if(ST.pg==='exp-detail')   return pgExpDetail(ST.param);
  if(ST.pg==='activities')   return pgActivities();
  if(ST.pg==='act-detail')   return pgActDetail(ST.param);
  if(ST.pg==='destinations') return pgDests();
  if(ST.pg==='team')         return pgTeam();
  if(ST.pg==='about')        return pgAbout();
  if(ST.pg==='blog')         return pgBlog();
  if(ST.pg==='post')         return pgPost(ST.param);
  if(ST.pg==='contact')      return pgContact();
  if(ST.pg==='plan')         return pgPlan();
  if(ST.pg==='login')        return pgLogin();
  if(ST.pg==='dashboard')    return pgDash(ST.param||ST.dTab);
  return pgHome();
}

/* Update the native top app bar + bottom tab bar for the current page */
function syncAppShell(pg){
  var titles = {
    home:'Roamers', experiences:'Voyages', 'exp-detail':'Détails du voyage',
    activities:'Activités', 'act-detail':'Détails activité',
    destinations:'Destinations', team:'Team Building', about:'À propos',
    blog:'Magazine', post:'Article', contact:'Contact', plan:'Planifier',
    login:'Connexion', dashboard:'Mon compte', admin:'Admin'
  };
  var ttl = document.getElementById('abTitle');
  if (ttl) ttl.textContent = titles[pg] || 'Roamers';
  var rootTabs = ['home','experiences','activities','dashboard','contact'];
  var bk = document.getElementById('abBack');
  if (bk) bk.style.display = (rootTabs.indexOf(pg) === -1 && APP_HISTORY.length) ? 'flex' : 'none';
  var tb = document.getElementById('appTopbar');
  if (tb) tb.classList.toggle('dark', pg==='home');
  var tabMap = {
    home:'home', experiences:'experiences', 'exp-detail':'experiences',
    activities:'activities', 'act-detail':'activities',
    dashboard:'dashboard', login:'dashboard',
    contact:'contact', plan:'plan', about:'contact', blog:'contact',
    team:'contact', destinations:'experiences'
  };
  var active = tabMap[pg] || '';
  document.querySelectorAll('#appTabs .app-tab').forEach(function(t){
    t.classList.toggle('on', t.dataset.pg === active);
  });
  if (tb) tb.style.display = '';
  var tabs = document.getElementById('appTabs');
  if (tabs) tabs.style.display = '';
  document.body.classList.remove('is-login');
}

function appBack(){
  if (APP_HISTORY.length){
    var prev = APP_HISTORY.pop();
    var saved = ST.pg; ST.pg = null;
    go(prev.pg, prev.param);
    if (APP_HISTORY[APP_HISTORY.length-1] && APP_HISTORY[APP_HISTORY.length-1].pg === saved) APP_HISTORY.pop();
  } else {
    go('home');
  }
}

function doAppSearch(q){
  var res=document.getElementById('appSearchResults');
  q=(q||'').trim().toLowerCase();
  if(!q){res.innerHTML='';return;}
  var src=(ST.exps&&ST.exps.length)?ST.exps:EXP;
  var hits=src.filter(function(e){
    return (e.title||'').toLowerCase().includes(q)||(e.loc||e.destination||'').toLowerCase().includes(q)||(e.desc||'').toLowerCase().includes(q);
  }).slice(0,8);
  if(!hits.length){res.innerHTML='<div class="srch-empty">Aucun résultat pour "'+q+'"</div>';return;}
  res.innerHTML=hits.map(function(e){
    var sub=(e.loc||e.destination||'')+(e.dur?' · '+e.dur:'')+(e.price?' · '+(e.price).toLocaleString()+' MAD':'');
    return '<div class="srch-item" onclick="closeAppSearch();go(\'exp-detail\',\''+e.id+'\')">'
      +'<img src="'+(e.img||'')+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
      +'<div class="srch-item-body"><div class="srch-item-title">'+e.title+'</div><div class="srch-item-sub">'+sub+'</div></div>'
      +'</div>';
  }).join('');
}

/* AUTH */
function getUsers(){ return JSON.parse(localStorage.getItem('rc_users')||'[]'); }
function saveUsers(u){ localStorage.setItem('rc_users',JSON.stringify(u)); }

function doRegister(){
  var fn=v('rFn'),ln=v('rLn'),em=v('rEm'),ph=v('rPh'),pw=v('rPw'),pw2=v('rPw2');
  var tc=document.getElementById('rTc');
  var co=document.getElementById('rCo');
  if(!fn||!ln){showErr('regErr','Veuillez entrer votre nom complet.');return;}
  if(!em||!em.includes('@')){showErr('regErr','Email invalide.');return;}
  if(pw.length<6){showErr('regErr','Le mot de passe doit comporter au moins 6 caractères.');return;}
  if(pw!==pw2){showErr('regErr','Les mots de passe ne correspondent pas.');return;}
  if(tc&&!tc.checked){showErr('regErr','Veuillez accepter les conditions d\'utilisation.');return;}
  apiPost('/auth/register',{fname:fn,lname:ln,email:em,password:pw,phone:ph||'',country:co?co.value:'Morocco'})
    .then(function(d){
      localStorage.setItem('rc_token', d.token);
      localStorage.setItem('rc_user', JSON.stringify(d.user));
      ST.user=d.user;
      syncNav();
      go('dashboard','overview');
      toast('Bienvenue sur Roamers Community, '+fn+' !');
    }).catch(function(err){showErr('regErr', err.message||'Erreur lors de l\'inscription.');});
}

function doLogin(){
  var em=v('lEm'),pw=v('lPw');
  if(!em||!pw){showErr('loginErr','Veuillez entrer votre email et mot de passe.');return;}
  var btn=document.querySelector('[onclick="doLogin()"]');
  if(btn){btn.textContent='Connexion...';btn.disabled=true;}
  apiPost('/auth/login',{email:em,password:pw})
    .then(function(d){
      localStorage.setItem('rc_token',d.token);
      localStorage.setItem('rc_user',JSON.stringify(d.user));
      ST.user=d.user;
      syncNav();
      if(d.user.role==='admin'){
        sessionStorage.setItem('rc_admin_auth','true');
        window.location.href='admin.html';
        return;
      }
      go('dashboard','overview');
      toast('Bon retour, '+d.user.fname+' !');
    }).catch(function(err){
      showErr('loginErr',err.message||'Email ou mot de passe incorrect.');
      if(btn){btn.textContent='Se connecter';btn.disabled=false;}
    });
}

function doLogout(){
  ST.user=null;
  localStorage.removeItem('rc_token');
  localStorage.removeItem('rc_user');
  syncNav();
  go('home');
  toast('Vous avez été déconnecté.');
}

function saveProfile(){
  var fn=v('pFn'),ln=v('pLn'),ph=v('pPh'),bi=v('pBi');
  var co=document.getElementById('pCo');
  if(!fn||!ln){toast('Please enter your full name.','warn');return;}
  var users=getUsers();
  var idx=users.findIndex(function(u){return u.id===ST.user.id;});
  if(idx===-1)return;
  users[idx].fname=fn; users[idx].lname=ln;
  users[idx].phone=ph||''; users[idx].bio=bi||'';
  if(co) users[idx].country=co.value;
  saveUsers(users);
  ST.user=users[idx];
  localStorage.setItem('rc_user',JSON.stringify(ST.user));
  syncNav();
  toast('Profile saved successfully!');
}

function changePass(){
  var cur=v('sPcur'),nw=v('sPnw'),nw2=v('sPnw2');
  if(!ST.user)return;
  if(ST.user.pass!==btoa(cur)){showErr('pwErr','Current password is incorrect.');return;}
  if(nw.length<6){showErr('pwErr','New password must be at least 6 characters.');return;}
  if(nw!==nw2){showErr('pwErr','Passwords do not match.');return;}
  var users=getUsers();
  var idx=users.findIndex(function(u){return u.id===ST.user.id;});
  if(idx===-1)return;
  users[idx].pass=btoa(nw);
  saveUsers(users);
  ST.user=users[idx];
  localStorage.setItem('rc_user',JSON.stringify(ST.user));
  showOk('pwOk','Password updated successfully!');
}

function toggleWL(id){
  if(!ST.user){go('login');toast('Sign in to save to your wishlist','warn');return;}
  var users=getUsers();
  var idx=users.findIndex(function(u){return u.id===ST.user.id;});
  if(idx===-1)return;
  var wl=users[idx].wishlist||[];
  var wi=wl.indexOf(id);
  if(wi===-1){wl.push(id);toast('Added to wishlist');}
  else{wl.splice(wi,1);toast('Removed from wishlist');}
  users[idx].wishlist=wl;
  saveUsers(users);
  ST.user=users[idx];
  localStorage.setItem('rc_user',JSON.stringify(ST.user));
  if(ST.pg==='dashboard') go('dashboard',ST.dTab);
}

function isWL(id){ return !!(ST.user&&(ST.user.wishlist||[]).indexOf(id)!==-1); }

function _renderItModal(){
  var c = document.getElementById('itModalContent');
  if(!c || !_IT.length) return;
  var n = _IT.length;
  var imgs = (_ITExp && _ITExp.imgs && _ITExp.imgs.length) ? _ITExp.imgs : (_ITExp ? [_ITExp.img] : []);
  var expTitle = _ITExp ? _ITExp.title : 'Programme';

  /* sticky header */
  var html = '<div class="it-modal-hd">'
    +'<div>'
      +'<div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-bottom:2px">Programme complet</div>'
      +'<div style="font-size:16px;font-weight:700;color:var(--txt);line-height:1.2">'+expTitle+'</div>'
    +'</div>'
    +'<button onclick="document.getElementById(\'itModal\').classList.remove(\'open\');document.body.style.overflow=\'\'" style="width:34px;height:34px;border-radius:50%;border:1px solid var(--bdr);background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0">✕</button>'
  +'</div>';

  /* day quick-nav dots */
  html += '<div style="display:flex;gap:6px;align-items:center;padding:10px 20px 12px;background:#fff;border-bottom:1px solid var(--bdr)">'
    +_IT.map(function(d,i){
      return '<button onclick="navItDay('+i+')" style="display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:8px;transition:background .15s" onmouseover="this.style.background=\'rgba(184,23,46,.07)\'" onmouseout="this.style.background=\'none\'">'
        +'<div style="width:7px;height:7px;border-radius:50%;background:var(--red);opacity:.85"></div>'
        +'<span style="font-size:10px;font-weight:700;color:var(--mut);font-family:\'Bebas Neue\',cursive;letter-spacing:.04em">J'+d.d+'</span>'
      +'</button>';
    }).join('')
    +'<span style="font-size:11px;color:var(--mut);margin-left:auto">'+n+' jour'+(n>1?'s':'')+'</span>'
  +'</div>';

  /* timeline blocks */
  _IT.forEach(function(d, i){
    var img = d.img || (imgs.length ? imgs[i % imgs.length] : '');
    /* split description into sentences as mini steps */
    var steps = d.desc.split(/\.\s+/).filter(Boolean);

    html += '<div class="it-day-block" id="it-block-'+i+'" style="position:relative">';

    /* photo */
    if(img){
      html += '<div class="it-day-photo-wrap">'
        +'<img src="'+img+'" class="it-day-photo" alt="Jour '+(i+1)+'" loading="lazy">'
        +'<div class="it-day-badge">'
          +'<div class="it-day-num"><span>J</span>'+(i+1)+'</div>'
          +'<div class="it-day-title-overlay">'+d.t+'</div>'
        +'</div>'
      +'</div>';
    }

    /* body */
    html += '<div class="it-day-body">';
    if(!img){
      html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'
        +'<div class="it-day-num" style="position:static;width:40px;height:40px"><span>J</span>'+(i+1)+'</div>'
        +'<h3 style="font-size:17px;font-weight:700;color:var(--txt);line-height:1.2">'+d.t+'</h3>'
      +'</div>';
    } else {
      html += '<h3 style="font-size:15px;font-weight:700;color:var(--txt);margin-bottom:10px;line-height:1.3">'+d.t+'</h3>';
    }

    /* steps from description */
    html += '<div style="display:flex;flex-direction:column;gap:7px">';
    steps.forEach(function(s){
      html += '<div class="it-step">'
        +'<div class="it-step-dot"></div>'
        +'<div class="it-step-txt">'+s.trim().replace(/\.$/,'')+'.</div>'
      +'</div>';
    });
    html += '</div></div>';

    /* connector except last */
    if(i < n-1){
      html += '<div style="display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--cream);border-bottom:1px solid var(--bdr)">'
        +'<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M7 13l-3-3M7 13l3-3" stroke="var(--red)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>'
        +'<span style="font-size:11px;color:var(--mut);font-weight:600;letter-spacing:.06em;text-transform:uppercase">Jour '+_IT[i+1].d+' — '+_IT[i+1].t+'</span>'
      +'</div>';
    }

    html += '</div>';
  });

  c.innerHTML = html;
}

function calcP(){
  var b=ST.bk; if(!b.exp)return{adult:0,child:0,ao:0,total:0};
  var ad=b.exp.price*b.adults;
  var ch=b.exp.pChild?b.exp.pChild*b.children:0;
  var ao=0;
  Object.keys(b.addons).forEach(function(id){
    if(!b.addons[id])return;
    var a=ADDONS.find(function(x){return x.id===id;});
    if(!a)return;
    if(a.unit==='/person')ao+=a.price*(b.adults+b.children);
    else if(a.unit==='/day')ao+=a.price*b.exp.days;
    else if(a.unit==='/night')ao+=a.price*b.exp.nights;
    else ao+=a.price;
  });
  return{adult:ad,child:ch,ao:ao,total:ad+ch+ao};
}

function pRows(p,b){
  var h='<div class="pr"><span>'+b.adults+' adult'+(b.adults>1?'s':'')+' x '+b.exp.price.toLocaleString()+' MAD</span><span>'+p.adult.toLocaleString()+' MAD</span></div>';
  if(b.children&&b.exp.pChild)h+='<div class="pr"><span>'+b.children+' child'+(b.children>1?'ren':'')+' x '+b.exp.pChild.toLocaleString()+' MAD</span><span>'+p.child.toLocaleString()+' MAD</span></div>';
  if(p.ao)h+='<div class="pr"><span>Add-ons</span><span>+'+p.ao.toLocaleString()+' MAD</span></div>';
  h+='<div class="pr pt"><span>Total</span><span>'+p.total.toLocaleString()+' MAD</span></div>';
  return h;
}

function initReveal(){

    entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('revealed');obs.unobserve(e.target);}});
  },{threshold:.08,rootMargin:'0px 0px -20px 0px'});
  document.querySelectorAll('.reveal:not(.revealed)').forEach(function(el){obs.observe(el);});

window.addEventListener('scroll',function(){
  var nav=document.getElementById('nav');
  if(!nav)return;
  nav.classList.toggle('solid', ST.pg!=='home' || window.scrollY>60);

  /* Scroll progress bar */
  var prog = document.getElementById('scrollProgress');
  if(prog){
    var h = document.documentElement.scrollHeight - window.innerHeight;
    prog.style.width = (h > 0 ? (window.scrollY / h * 100) : 0) + '%';
  }

  /* Stat counter animation — trigger once when stats scroll into view */
  document.querySelectorAll('.js-stat:not(.counted)').forEach(function(el){
    var rect = el.getBoundingClientRect();
    if(rect.top < window.innerHeight - 40){
      el.classList.add('counted');
      var numEl = el.querySelector('.sc-n');
      if(!numEl) return;
      var raw = el.dataset.val || '';
      var suffix = raw.replace(/[\d]/g,'');
      var target = parseInt(raw);
      if(isNaN(target)) return;
      var start = 0, duration = 1400, startTime = null;
      function step(ts){
        if(!startTime) startTime = ts;
        var progress = Math.min((ts - startTime) / duration, 1);
        var ease = 1 - Math.pow(1 - progress, 3);
        numEl.textContent = Math.round(start + (target - start) * ease) + suffix;
        if(progress < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }
  });
});
/* PAGE: HOME */
function initHeroCanvas(){
  var c=document.getElementById('heroCanvas');
  if(!c)return;
  var ctx=c.getContext('2d');
  var W=c.width=c.offsetWidth||375,H=c.height=c.offsetHeight||700;
  var pts=[];
  for(var i=0;i<80;i++){
    pts.push({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*1.8+.3,
      vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,
      a:Math.random()*.55+.15,
      col:Math.random()<.55?'255,255,255':Math.random()<.5?'217,184,122':'184,23,46',
      pulse:Math.random()*Math.PI*2,ps:Math.random()*.02+.008
    });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<pts.length;i++){
      var p=pts[i];
      p.pulse+=p.ps;
      var alpha=p.a*(0.6+0.4*Math.sin(p.pulse));
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba('+p.col+','+alpha+')';ctx.fill();
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    }
    requestAnimationFrame(draw);
  }
  draw();
}

  var SEGS = [
    {id:'all',     label:'Toutes',           icon:'✦',  desc:'',          color:'var(--red)'},
    {id:'groupe',  label:'Voyage de Groupe', icon:'🧭', desc:'Départs fixes avec d\'autres voyageurs',   color:'var(--red)'},
    {id:'weekend', label:'Weekend à Thème',  icon:'🌙', desc:'2–3 jours de dépaysement total',           color:'#7C3AED'},
    {id:'express', label:'Activité Express', icon:'⚡', desc:'De 1 h à une journée — plongez dès aujourd\'hui', color:'var(--sage)'}
  ];
  var TYPES = [
    {id:'all',      label:'Tous les types', icon:'🗺️'},
    {id:'desert',   label:'Désert',         icon:'🏜️'},
    {id:'mountain', label:'Montagne',       icon:'⛰️'},
    {id:'coastal',  label:'Côtier',         icon:'🌊'},
    {id:'cultural', label:'Culturel',       icon:'🏛️'}
  ];

  var activeSeg = SEGS.find(function(s){return s.id===SEG;})||SEGS[0];

  // Redirect service segments to their dedicated pages
  if(SEG==='team')   { go('team'); return ''; }
  if(SEG==='mesure') { go('plan'); return ''; }

  // Filter — team & mesure excluded (separate services, not catalogue categories)
  var items = EXP.filter(function(e){
    if(SEG==='express') return false; // express links to ACTS page
    if(e.segment==='team')   return false;
    if(e.segment==='mesure') return false;
    var sOk = SEG==='all' || e.segment===SEG;
    var tOk = TYPE==='all' || e.type===TYPE;
    var qOk = !Q
      || (e.title||'').toLowerCase().includes(Q)
      || (e.loc||'').toLowerCase().includes(Q)
      || (e.desc||'').toLowerCase().includes(Q)
      || (e.tags||[]).join(' ').toLowerCase().includes(Q);
